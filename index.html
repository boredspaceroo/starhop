    function showPause() {
      if (scene!=="playing") return;
      scene="paused"; charging=false; screen.classList.remove("hidden");
      screen.innerHTML=`
        <div class="panel">
          <p class="panel-kicker">Orbit suspended</p><h2>Just floating.</h2>
          <p>Your roo will wait. Space has nowhere else to be.</p>
          <div class="panel-actions">
            <button class="button primary" data-action="resume">Resume</button>
            <button class="button" data-action="restart">Restart run</button>
            <button class="button" data-action="menu">Mission control</button>

    // MULTIPLAYER TIE RESOLUTION — every top scorer is retained, including zero-score draws.
    function resolvePartyResult(scores) {
      const highScore=Math.max(...scores.map(entry=>Number(entry.score)||0));
      const tied=scores.map((entry,index)=>({...entry,player:index+1})).filter(entry=>Number(entry.score)===highScore);
      return {highScore,tied,isDraw:tied.length>1,winner:tied.length===1?tied[0]:null};
    }

    function showPartyResults() {
      scene="partyresults"; setControlsVisible(false); screen.classList.remove("hidden");
      const ranking=party.scores.map((r,i)=>({...r,player:i+1})).sort((a,b)=>b.score-a.score||a.player-b.player);
      const result=resolvePartyResult(party.scores);
      party.result=result;
      const tiedPlayers=new Set(result.tied.map(entry=>entry.player));
      const title=result.isDraw?"Draw in Orbit":`${escapeHTML(result.winner.name)} Wins!`;
      const summary=result.isDraw?`${result.tied.map(entry=>escapeHTML(entry.name)).join(" & ")} share the top score of ${result.highScore}.`:"The universe acknowledges a new, highly temporary champion.";
      screen.innerHTML=`
        <div class="panel">
          <p class="panel-kicker">Party complete</p><h2>${title}</h2>
          <p>${summary}</p>
          <div class="scoreboard">${ranking.map(r=>`<div class="score-line ${tiedPlayers.has(r.player)?"winner":""}"><span>${tiedPlayers.has(r.player)?"★ ":""}${escapeHTML(r.name)}</span><strong>${r.score}</strong></div>`).join("")}</div>

        </div>`;

    // MOBILE LEADERBOARD RENDERING AND PLAYER SEARCH
    function formatScoreTime(value) {
      const date=new Date(value);
      if (Number.isNaN(date.getTime())) return {date:"DATE UNKNOWN",time:""};
      return {
        date:new Intl.DateTimeFormat(undefined,{day:"2-digit",month:"short",year:"numeric"}).format(date).toUpperCase(),
        time:new Intl.DateTimeFormat(undefined,{hour:"numeric",minute:"2-digit"}).format(date).toUpperCase()
      };
    }

    function renderScoreCard(entry,index) {
      const when=formatScoreTime(entry.createdAt);
      const modeLabel=entry.mode==="party"?`PARTY · ${entry.playerCount} PLAYERS`:"SINGLE";
      const sourceLabel=entry.source==="demo"?" · DEMO":entry.source==="session"?" · THIS SESSION":"";
      return `<details class="score-card">
        <summary><span class="score-rank">#${index+1}</span><span class="score-name">${escapeHTML(entry.name)}<small>${entry.starsCollected} STARS · ${entry.bestCombo} COMBO · ${entry.perfects} PERFECTS</small></span><strong class="score-points">${entry.score.toLocaleString()}</strong></summary>
        <div class="score-details"><span>${entry.planets} PLANETS · ${modeLabel}${sourceLabel}</span><span>${when.date} · ${when.time}</span></div>
      </details>`;
    }

    async function shareScore() {
      let score=run.score;
      let resultLine="";
      if (scene==="partyresults" && party.result) {
        score=party.result.highScore;
        if (party.result.isDraw) resultLine=`Draw: ${party.result.tied.map(entry=>entry.name).join(" & ")}\n`;
        else {
          score=Math.max(score,knownBestScores.get(party.result.winner.name)||0);
          resultLine=`Winner: ${party.result.winner.name}\n`;
        }
      } else {
        const name=run.result?.name||activeRunName();
        score=Math.max(knownBestScores.get(name)||0,run.score);
      }
      const text=`Star Hop\n\n${resultLine}Best Score:\n${score}\n\n${STAR_HOP_GAME_URL}`;
      try {
        if (navigator.share) await navigator.share({title:"Star Hop",text});
        else if (navigator.clipboard?.writeText) { await navigator.clipboard.writeText(text); showToast("Score copied for launch"); }
        else {
          const helper=document.createElement("textarea"); helper.value=text; helper.style.position="fixed"; helper.style.opacity="0"; document.body.appendChild(helper); helper.select(); document.execCommand("copy"); helper.remove(); showToast("Score copied for launch");
        }
      } catch(error) {
        if (error?.name!=="AbortError") console.warn("Star Hop score could not be shared.",error);
      }
    }

    screen.addEventListener("submit", event => {

        const input=form.elements.name;

          const error=$(`#partyError${i}`);
          error.textContent=validation.message;
          if (!validation.valid) { valid=false; if (!confirmed.invalidInput) confirmed.invalidInput=input; }
          confirmed[i]=validation.name;
        }
        if (!valid) { confirmed.invalidInput?.focus(); return; }
        confirmed.forEach((name,i)=>identities.partyNames[i]=name);
        persistIdentities(); startParty();
      }
      if (form.dataset.form==="player-search") showPlayerScores(form.elements.name.value);
    });

    soundButton.addEventListener("click", (e)=>{e.stopPropagation();toggleSound();});

    window.addEventListener("pointerup", (e)=>{if(scene==="playing") {e.preventDefault();releaseCharge();}}, {passive:false});
    window.addEventListener("pointercancel", ()=>{if(scene==="playing") releaseCharge();});

    window.addEventListener("resize", resize, {passive:true});

    function drawBackground(now) {
      const gradient=ctx.createLinearGradient(0,0,0,H);
      gradient.addColorStop(0,"#080719"); gradient.addColorStop(.52,"#11102a"); gradient.addColorStop(1,"#17132d");
      ctx.fillStyle=gradient; ctx.fillRect(0,0,W,H);

      const sun=ctx.createRadialGradient(-10,H*.08,5,-10,H*.08,W*.58);
      sun.addColorStop(0,"rgba(255,181,107,.2)"); sun.addColorStop(.35,"rgba(242,107,94,.055)"); sun.addColorStop(1,"rgba(12,11,29,0)");
      ctx.fillStyle=sun;ctx.fillRect(0,0,W,H);

      ctx.save();
      skyStars.forEach(s=>{
        const twinkle=.68+.32*Math.sin(now*.001*s.speed+s.phase);
        const y=(s.y-(cameraY*.035*s.layer))%H;
        ctx.globalAlpha=s.a*twinkle;
        ctx.fillStyle=s.r>1.5?COLORS.gold:COLORS.cream;
        ctx.beginPath();ctx.arc(s.x,(y+H)%H,s.r,0,TAU);ctx.fill();
      });
      ctx.restore();

      ctx.save(); ctx.strokeStyle="rgba(255,181,107,.1)"; ctx.lineWidth=1;
      ctx.beginPath();ctx.ellipse(W*.5,H*.52,W*.68,H*.27,-.28,0,TAU);ctx.stroke();
      ctx.beginPath();ctx.ellipse(W*.38,H*.38,W*.55,H*.19,.4,0,TAU);ctx.stroke();ctx.restore();
    }

    function drawMenu(now) {
      const p=demoPlanet;
      drawPlanet(p,0,now,true);
      const a=menuOrbit;
      const x=p.x+Math.cos(a)*(p.r+50), y=p.y+Math.sin(a)*(p.r+31);
      ctx.save();ctx.setLineDash([4,7]);ctx.strokeStyle="rgba(255,211,106,.55)";ctx.lineWidth=1.4;ctx.beginPath();ctx.ellipse(p.x,p.y,p.r+50,p.r+31,0,0,TAU);ctx.stroke();ctx.restore();
      drawStarShape(p.x+p.r+39,p.y-p.r-18,12,COLORS.gold,now*.002);
      drawRooAt(x,y,a+Math.PI/2,clamp(W*.23,76,108),true);
      if (Math.sin(now*.00055)>0.97) drawShootingStar(now);
    }

    function drawShootingStar(now) {
      const t=(now*.00018)%1; const x=W*(1-t),y=H*.23+t*90;
      const g=ctx.createLinearGradient(x,y,x+60,y-30);g.addColorStop(0,"rgba(255,211,106,.8)");g.addColorStop(1,"rgba(255,211,106,0)");
      ctx.strokeStyle=g;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+60,y-30);ctx.stroke();
    }

    function drawGame(now) {
      ctx.save();
      if (bossDirector.arenaActive) {
        planets.forEach(p=>drawPlanet(p,-cameraY,now,false));
      } else {
        for (let i=Math.max(0,currentIndex-1);i<Math.min(planets.length,currentIndex+5);i++) {
          const p=planets[i], sy=p.y-cameraY;
          if (sy>-240&&sy<H+240) drawPlanet(p,sy-p.y,now,false);
        }
      }
      collectibles.forEach(star=>{
        if(star.taken||(!star.arena&&(star.leg<currentIndex-1||star.leg>currentIndex+1)))return;
        const sy=star.y-cameraY;if(sy<-40||sy>H+40)return;
        drawStarShape(star.x,sy,star.r*(1+.08*Math.sin(now*.004+star.phase)),COLORS.gold,now*.001+star.phase);
      });
      satellites.forEach(s=>{if(s.leg>=currentIndex-1&&s.leg<=currentIndex+1)(s.alien?drawAlienSatellite(s.x,s.y-cameraY,s.angle,s.variant,now):drawSatellite(s.x,s.y-cameraY,s.angle));});

      if(bossDirector.visible) {
        drawBossBeam(now);
        drawBoss(now);
      }

      if(charging&&roo.state==="grounded") drawPrediction(predictedPath());
      particles.forEach(p=>drawParticle(p));
      floaters.forEach(f=>drawFloater(f));

      if(roo.state!=="lost") drawRooAt(roo.x,roo.y-cameraY,roo.rotation,roo.state==="flying"?74:79,false);
      else drawRooAt(roo.x,roo.y-cameraY,roo.rotation+Math.sin(now*.01)*.05,74,false);
      ctx.restore();
    }

    function drawPlanet(p, yOffset, now, demo=false) {
      const x=p.x, y=p.y+yOffset, r=p.r;
      if (p.isSun) { drawSun(p,yOffset,now); return; }
      if (p.kind==="redGiant") { drawRedGiant(p,yOffset,now); return; }
      if (p.kind==="alienShip") { drawAlienShip(p,yOffset,now); return; }
      if (p.kind==="asteroid") { drawAsteroid(p,yOffset,now); return; }
      ctx.save();ctx.translate(x,y);
      if(p.ring) {
        ctx.save();ctx.rotate(-.3);ctx.strokeStyle="rgba(255,211,106,.38)";ctx.lineWidth=Math.max(5,r*.12);ctx.beginPath();ctx.ellipse(0,0,r*1.55,r*.38,0,0,TAU);ctx.stroke();ctx.restore();
      }
      ctx.shadowColor="rgba(242,107,94,.25)";ctx.shadowBlur=demo?28:18;
      const grad=ctx.createRadialGradient(-r*.33,-r*.38,r*.08,0,0,r*1.15);
      grad.addColorStop(0,p.palette[1]);grad.addColorStop(.62,p.palette[0]);grad.addColorStop(1,p.palette[2]);
      ctx.fillStyle=grad;ctx.beginPath();ctx.arc(0,0,r,0,TAU);ctx.fill();ctx.shadowBlur=0;
      ctx.save();ctx.beginPath();ctx.arc(0,0,r-1,0,TAU);ctx.clip();
      ctx.rotate(p.phase+now*.000015*(p.index%2?1:-1));
      p.craters.forEach((c,i)=>{
        const cx=Math.cos(c.a)*r*c.d,cy=Math.sin(c.a)*r*c.d;
        ctx.save();ctx.translate(cx,cy);ctx.rotate(c.a*.7);ctx.scale(1,c.squish);
        ctx.fillStyle=i%2?"rgba(55,25,48,.22)":"rgba(255,242,213,.11)";
        ctx.beginPath();ctx.arc(0,0,r*c.r,0,TAU);ctx.fill();
        ctx.strokeStyle="rgba(255,242,213,.08)";ctx.lineWidth=1;ctx.stroke();ctx.restore();
      });
      ctx.restore();
      ctx.strokeStyle="rgba(255,242,213,.24)";ctx.lineWidth=1.2;ctx.beginPath();ctx.arc(0,0,r-.8,Math.PI*1.1,Math.PI*1.9);ctx.stroke();
      if(p.kind==="bossTransition") {
        ctx.strokeStyle="rgba(183,168,255,.65)";ctx.lineWidth=2;ctx.setLineDash([4,6]);ctx.beginPath();ctx.arc(0,0,r+10+(reducedMotion?0:3*Math.sin(now*.003)),0,TAU);ctx.stroke();ctx.setLineDash([]);
        ctx.fillStyle="#c8c1ff";ctx.font=`900 ${Math.max(12,r*.3)}px 'Courier New',monospace`;ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("⌁",0,0);
      }
      ctx.restore();
    }

    // SUN APPEARANCE — uses the normal planet geometry so reachability and collision stay identical.
    function drawSun(p,yOffset,now) {
      const x=p.x,y=p.y+yOffset,r=p.r;
      const pulse=reducedMotion?1:1+.025*Math.sin(now*.002+p.phase);
      ctx.save();ctx.translate(x,y);
      ctx.strokeStyle="rgba(255,211,106,.22)";ctx.lineWidth=Math.max(2,r*.05);
      for(let i=0;i<12;i++) {
        const angle=i*TAU/12+(reducedMotion?0:now*.00006);
        ctx.beginPath();ctx.moveTo(Math.cos(angle)*r*1.08,Math.sin(angle)*r*1.08);ctx.lineTo(Math.cos(angle)*r*1.24*pulse,Math.sin(angle)*r*1.24*pulse);ctx.stroke();
      }
      ctx.shadowColor="rgba(255,173,66,.7)";ctx.shadowBlur=24;
      const glow=ctx.createRadialGradient(-r*.3,-r*.35,r*.05,0,0,r*1.08);
      glow.addColorStop(0,"#fff7c7");glow.addColorStop(.38,"#ffd36a");glow.addColorStop(.78,"#f49a3e");glow.addColorStop(1,"#ce463e");
      ctx.fillStyle=glow;ctx.beginPath();ctx.arc(0,0,r*pulse,0,TAU);ctx.fill();ctx.shadowBlur=0;
      ctx.strokeStyle="rgba(255,255,220,.5)";ctx.lineWidth=1.3;ctx.beginPath();ctx.arc(0,0,r*.82,p.phase-(reducedMotion?0:now*.00018),p.phase+1.7-(reducedMotion?0:now*.00018));ctx.stroke();
      ctx.fillStyle="rgba(204,70,62,.2)";
      [[-.3,-.12,.12],[.24,.2,.08],[.1,-.36,.06]].forEach(([sx,sy,sr])=>{ctx.beginPath();ctx.arc(sx*r,sy*r,sr*r,0,TAU);ctx.fill();});
      ctx.restore();
    }

    function drawRedGiant(p,yOffset,now) {
      const x=p.x,y=p.y+yOffset,r=p.r,pulse=reducedMotion?1:1+.014*Math.sin(now*.0015+p.phase);
      ctx.save();ctx.translate(x,y);
      const atmosphere=ctx.createRadialGradient(0,0,r*.74,0,0,r*1.24);
      atmosphere.addColorStop(0,"rgba(255,94,49,0)");atmosphere.addColorStop(.68,"rgba(255,78,42,.15)");atmosphere.addColorStop(1,"rgba(255,56,38,0)");
      ctx.fillStyle=atmosphere;ctx.beginPath();ctx.arc(0,0,r*1.25,0,TAU);ctx.fill();
      ctx.shadowColor="rgba(255,69,38,.6)";ctx.shadowBlur=30;
      const body=ctx.createRadialGradient(-r*.34,-r*.4,r*.06,0,0,r*1.08);
      body.addColorStop(0,"#ffc071");body.addColorStop(.35,"#f66b3f");body.addColorStop(.72,"#aa3031");body.addColorStop(1,"#571c2a");
      ctx.fillStyle=body;ctx.beginPath();ctx.arc(0,0,r*pulse,0,TAU);ctx.fill();ctx.shadowBlur=0;
      ctx.save();ctx.beginPath();ctx.arc(0,0,r*.985,0,TAU);ctx.clip();ctx.rotate(p.phase+(reducedMotion?0:now*.000025));
      ctx.strokeStyle="rgba(255,190,106,.24)";ctx.lineWidth=Math.max(3,r*.035);
      for(let i=0;i<7;i++){const yy=(-.62+i*.2)*r;ctx.beginPath();ctx.moveTo(-r,yy);ctx.bezierCurveTo(-r*.35,yy+r*.12*Math.sin(i),r*.35,yy-r*.1*Math.cos(i),r,yy);ctx.stroke();}
      ctx.fillStyle="rgba(70,18,32,.25)";p.craters.slice(0,8).forEach(c=>{ctx.beginPath();ctx.ellipse(Math.cos(c.a)*r*c.d,Math.sin(c.a)*r*c.d,r*c.r*1.8,r*c.r*.8,c.a,0,TAU);ctx.fill();});ctx.restore();
      ctx.strokeStyle="rgba(255,140,69,.42)";ctx.lineWidth=3;for(let i=0;i<3;i++){const a=p.phase+i*2.1+(reducedMotion?0:now*.00006);ctx.beginPath();ctx.arc(Math.cos(a)*r*.83,Math.sin(a)*r*.83,r*.24,a-.8,a+.55);ctx.stroke();}
      ctx.restore();
    }

    function drawAlienShip(p,yOffset,now) {
      const x=p.x,y=p.y+yOffset,r=p.r,eyeAngle=Math.atan2(roo.y-cameraY-y,roo.x-x);
      ctx.save();ctx.translate(x,y);
      if(!reducedMotion)ctx.translate(0,Math.sin(now*.0013+p.phase)*2);
      const scan=(now*.00018+p.phase)%1;
      if(scan<.62){ctx.save();ctx.globalAlpha=.09*(1-scan/.62);ctx.fillStyle=COLORS.cyan;ctx.beginPath();ctx.moveTo(-r*.62,r*.48);ctx.lineTo(r*.62,r*.48);ctx.lineTo(r*1.18,r*2.2);ctx.lineTo(-r*1.18,r*2.2);ctx.closePath();ctx.fill();ctx.restore();}
      ctx.shadowColor="rgba(113,214,209,.35)";ctx.shadowBlur=22;
      const hull=ctx.createLinearGradient(0,-r,0,r);hull.addColorStop(0,"#a9bbc3");hull.addColorStop(.38,"#526b78");hull.addColorStop(1,"#26313e");
      ctx.fillStyle=hull;ctx.beginPath();ctx.ellipse(0,0,r,r*.77,0,0,TAU);ctx.fill();ctx.shadowBlur=0;
      ctx.strokeStyle="rgba(255,242,213,.26)";ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(0,0,r*.9,r*.67,0,0,TAU);ctx.stroke();
      ctx.fillStyle="#273044";ctx.beginPath();ctx.ellipse(0,-r*.16,r*.48,r*.38,0,0,TAU);ctx.fill();
      ctx.fillStyle="rgba(151,245,255,.22)";ctx.beginPath();ctx.ellipse(0,-r*.22,r*.41,r*.29,0,Math.PI,TAU);ctx.fill();
      [-.54,-.3,0,.3,.54].forEach((n,i)=>{ctx.fillStyle=i%2?COLORS.gold:COLORS.cyan;ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=8;ctx.beginPath();ctx.arc(n*r,r*.43,r*.045,0,TAU);ctx.fill();});ctx.shadowBlur=0;
      [-.18,.18].forEach(n=>{ctx.fillStyle="#92f5da";ctx.beginPath();ctx.ellipse(n*r,-r*.16,r*.105,r*.075,0,0,TAU);ctx.fill();ctx.fillStyle="#172033";ctx.beginPath();ctx.arc(n*r+Math.cos(eyeAngle)*r*.025,-r*.16+Math.sin(eyeAngle)*r*.018,r*.035,0,TAU);ctx.fill();});
      ctx.strokeStyle="#bb9cff";ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,r*.02,r*.18,.15,Math.PI-.15);ctx.stroke();
      ctx.strokeStyle="rgba(183,168,255,.5)";ctx.lineWidth=2;for(let i=-2;i<=2;i++){ctx.beginPath();ctx.moveTo(i*r*.22,-r*.67);ctx.lineTo(i*r*.25,-r*.83-Math.abs(i)*3);ctx.stroke();}
      ctx.restore();
    }

    function drawAsteroid(p,yOffset,now) {
      const x=p.x,y=p.y+yOffset,r=p.r;
      ctx.save();ctx.translate(x,y);ctx.rotate(p.phase+(reducedMotion?0:now*.000025));
      ctx.shadowColor="rgba(183,168,255,.2)";ctx.shadowBlur=13;
      const grad=ctx.createRadialGradient(-r*.35,-r*.4,r*.08,0,0,r*1.05);grad.addColorStop(0,p.palette[1]);grad.addColorStop(.58,p.palette[0]);grad.addColorStop(1,p.palette[2]);ctx.fillStyle=grad;
      ctx.beginPath();for(let i=0;i<14;i++){const a=i*TAU/14,rr=r*(.9+.085*Math.sin(i*4.7+p.phase));i?ctx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr):ctx.moveTo(Math.cos(a)*rr,Math.sin(a)*rr);}ctx.closePath();ctx.fill();ctx.shadowBlur=0;
      p.craters.slice(0,7).forEach((c,i)=>{ctx.fillStyle=i%2?"rgba(20,18,35,.24)":"rgba(255,242,213,.1)";ctx.beginPath();ctx.ellipse(Math.cos(c.a)*r*c.d,Math.sin(c.a)*r*c.d,r*c.r,r*c.r*c.squish,c.a,0,TAU);ctx.fill();});ctx.restore();
    }

    function drawPrediction(path) {
      path.forEach((pt,i)=>{
        const y=pt.y-cameraY;if(y<-20||y>H+20)return;
        ctx.globalAlpha=.35+.55*(i/path.length);
        ctx.fillStyle=predictedHit?COLORS.gold:currentSuit().color;
        ctx.beginPath();ctx.arc(pt.x,y,2.2+(i%3===0?1:0),0,TAU);ctx.fill();
      });ctx.globalAlpha=1;
    }

    function drawStarShape(x,y,r,color,rotation=0) {
      ctx.save();ctx.translate(x,y);ctx.rotate(rotation);ctx.shadowColor=color;ctx.shadowBlur=12;ctx.fillStyle=color;ctx.beginPath();
      for(let i=0;i<10;i++){const rr=i%2===0?r:r*.43,a=-Math.PI/2+i*Math.PI/5;const px=Math.cos(a)*rr,py=Math.sin(a)*rr;i?ctx.lineTo(px,py):ctx.moveTo(px,py);}ctx.closePath();ctx.fill();
      ctx.shadowBlur=0;ctx.fillStyle="rgba(255,242,213,.75)";ctx.beginPath();ctx.arc(-r*.18,-r*.2,r*.17,0,TAU);ctx.fill();ctx.restore();
    }

    function drawSatellite(x,y,angle) {
      ctx.save();ctx.translate(x,y);ctx.rotate(angle+.5);ctx.strokeStyle=COLORS.apricot;ctx.lineWidth=1.3;
      ctx.fillStyle="#24355c";ctx.fillRect(-24,-7,16,14);ctx.fillRect(8,-7,16,14);
      ctx.strokeRect(-24,-7,16,14);ctx.strokeRect(8,-7,16,14);
      ctx.fillStyle="#5e537f";ctx.beginPath();ctx.roundRect(-9,-11,18,22,5);ctx.fill();ctx.stroke();
      ctx.fillStyle=COLORS.coral;ctx.beginPath();ctx.arc(0,0,3,0,TAU);ctx.fill();ctx.shadowColor=COLORS.coral;ctx.shadowBlur=10;ctx.fill();ctx.shadowBlur=0;
      ctx.beginPath();ctx.moveTo(0,-11);ctx.lineTo(0,-18);ctx.stroke();ctx.fillStyle=COLORS.gold;ctx.beginPath();ctx.arc(0,-19,2,0,TAU);ctx.fill();ctx.restore();
    }

    function drawAlienSatellite(x,y,angle,variant,now) {
      ctx.save();ctx.translate(x,y);ctx.rotate(angle+.35);const wave=reducedMotion?0:Math.sin(now*.006+variant)*2;
      ctx.fillStyle="rgba(181,244,255,.16)";ctx.strokeStyle="rgba(181,244,255,.75)";ctx.lineWidth=1.4;ctx.beginPath();ctx.arc(0,-2,15,Math.PI,TAU);ctx.lineTo(15,4);ctx.arc(0,4,15,0,Math.PI);ctx.closePath();ctx.fill();ctx.stroke();
      ctx.fillStyle=["#8fc6a5","#b7a8ff","#ffd36a"][variant%3];ctx.beginPath();ctx.ellipse(0,2,9,8,0,0,TAU);ctx.fill();
      ctx.fillStyle="#182137";const eyes=variant===1?3:2;for(let i=0;i<eyes;i++){const ex=(i-(eyes-1)/2)*5;ctx.beginPath();ctx.arc(ex,0,1.4,0,TAU);ctx.fill();}
      ctx.strokeStyle="#182137";ctx.beginPath();ctx.arc(0,3,4,.2,Math.PI-.2);ctx.stroke();
      ctx.strokeStyle=COLORS.apricot;ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(-8,8);ctx.lineTo(-17,12+wave);ctx.moveTo(8,8);ctx.lineTo(17,7-wave);ctx.stroke();
      ctx.beginPath();ctx.moveTo(0,-10);ctx.lineTo(variant===2?6:-3,-18);ctx.stroke();ctx.fillStyle=COLORS.coral;ctx.beginPath();ctx.arc(variant===2?6:-3,-19,2,0,TAU);ctx.fill();ctx.restore();
    }

    function drawBossBeam(now) {
      const beam=bossDirector.beam,target=planets[beam.target];
      if(!bossDirector.arenaActive||!target||!["warning","active"].includes(beam.phase))return;
      const bx=bossDirector.x,by=bossDirector.y+28,tx=target.x,ty=target.y-cameraY;
      ctx.save();
      if(beam.phase==="warning") {
        const pulse=reducedMotion?1:1+.09*Math.sin(now*.015);
        ctx.strokeStyle="rgba(255,211,106,.88)";ctx.lineWidth=2;ctx.setLineDash([6,6]);ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(tx,ty);ctx.stroke();ctx.setLineDash([]);
        ctx.beginPath();ctx.arc(tx,ty,(target.r+13)*pulse,0,TAU);ctx.stroke();
        for(let i=0;i<4;i++){const a=i*Math.PI/2;ctx.beginPath();ctx.moveTo(tx+Math.cos(a)*(target.r+6),ty+Math.sin(a)*(target.r+6));ctx.lineTo(tx+Math.cos(a)*(target.r+20),ty+Math.sin(a)*(target.r+20));ctx.stroke();}
      } else {
        const strength=clamp(beam.exposure/(TRACTOR_BEAM_ABDUCTION_MS/1000),0,1);
        const grad=ctx.createLinearGradient(bx,by,tx,ty);grad.addColorStop(0,"rgba(156,115,255,.44)");grad.addColorStop(1,`rgba(113,214,209,${.2+strength*.32})`);
        ctx.fillStyle=grad;ctx.beginPath();ctx.moveTo(bx-18,by);ctx.lineTo(bx+18,by);ctx.lineTo(tx+target.r*.72,ty);ctx.lineTo(tx-target.r*.72,ty);ctx.closePath();ctx.fill();
        ctx.strokeStyle="rgba(216,207,255,.72)";ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(tx,ty);ctx.stroke();
      }
      ctx.restore();
    }

    function drawBoss(now) {
      const b=bossDirector,w=b.width,h=w*.47;
      if(!b.visible||w<=0)return;
      const beamStrain=b.beam.phase==="active"&&!reducedMotion?Math.sin(now*.045)*2.2:0;
      const hover=reducedMotion?0:Math.sin(now*.0022)*3;
      const victory=b.state===BOSS_STATE.VICTORY;
      ctx.save();ctx.translate(b.x+beamStrain,b.y+hover);if(victory)ctx.rotate(Math.sin(now*.014)*.025);
      ctx.globalAlpha=victory?clamp(b.timer/1.3,.15,1):1;
      ctx.shadowColor=b.flash>0?"#fff":"rgba(113,214,209,.48)";ctx.shadowBlur=b.flash>0?30:18;
      const metal=ctx.createLinearGradient(0,-h*.5,0,h*.55);metal.addColorStop(0,b.flash>0?"#fff":"#9ab1bc");metal.addColorStop(.43,"#455c70");metal.addColorStop(1,"#20283c");
      ctx.fillStyle=metal;
      ctx.beginPath();ctx.moveTo(-w*.47,0);ctx.lineTo(-w*.26,-h*.28);ctx.lineTo(-w*.15,-h*.18);ctx.lineTo(0,-h*.4);ctx.lineTo(w*.15,-h*.18);ctx.lineTo(w*.26,-h*.28);ctx.lineTo(w*.47,0);ctx.lineTo(w*.34,h*.18);ctx.lineTo(w*.17,h*.12);ctx.lineTo(w*.1,h*.42);ctx.lineTo(-w*.1,h*.42);ctx.lineTo(-w*.17,h*.12);ctx.lineTo(-w*.34,h*.18);ctx.closePath();ctx.fill();ctx.shadowBlur=0;
      ctx.strokeStyle="rgba(255,242,213,.32)";ctx.lineWidth=2;ctx.stroke();
      [-1,1].forEach(side=>{ctx.fillStyle="#28334b";ctx.beginPath();ctx.moveTo(side*w*.19,-h*.05);ctx.lineTo(side*w*.43,h*.02);ctx.lineTo(side*w*.3,h*.12);ctx.lineTo(side*w*.16,h*.08);ctx.closePath();ctx.fill();for(let i=0;i<3;i++){ctx.fillStyle=i%2?COLORS.coral:COLORS.cyan;ctx.beginPath();ctx.arc(side*w*(.22+i*.07),h*.02,h*.035,0,TAU);ctx.fill();}});
      ctx.fillStyle="#172036";ctx.beginPath();ctx.ellipse(0,-h*.06,w*.17,h*.37,0,0,TAU);ctx.fill();
      const dome=ctx.createRadialGradient(-w*.05,-h*.2,3,0,-h*.05,w*.19);dome.addColorStop(0,"rgba(224,255,255,.82)");dome.addColorStop(.24,"rgba(113,214,209,.4)");dome.addColorStop(1,"rgba(68,65,123,.65)");ctx.fillStyle=dome;ctx.beginPath();ctx.ellipse(0,-h*.08,w*.145,h*.31,0,0,TAU);ctx.fill();ctx.strokeStyle="rgba(203,248,255,.68)";ctx.stroke();
      ctx.fillStyle="#9acb91";ctx.beginPath();ctx.ellipse(0,-h*.03,w*.095,h*.18,0,0,TAU);ctx.fill();
      const track=Math.atan2(roo.y-cameraY-(b.y+hover),roo.x-b.x);[-.04,.04].forEach(ex=>{ctx.fillStyle=b.beam.phase==="active"?"#fff27a":"#f7ffdc";ctx.beginPath();ctx.ellipse(ex*w,-h*.085,w*.029,h*.052,0,0,TAU);ctx.fill();ctx.fillStyle="#311d52";ctx.beginPath();ctx.arc(ex*w+Math.cos(track)*w*.008,-h*.085+Math.sin(track)*h*.012,w*.01,0,TAU);ctx.fill();});
      ctx.strokeStyle="#311d52";ctx.lineWidth=2.2;ctx.beginPath();ctx.arc(0,h*.005,w*.055,b.beam.phase==="active"?.05:.3,b.beam.phase==="active"?Math.PI-.05:Math.PI-.3);ctx.stroke();
      ctx.strokeStyle="rgba(183,168,255,.7)";ctx.lineWidth=2;for(let i=-2;i<=2;i++){ctx.beginPath();ctx.moveTo(i*w*.09,h*.23);ctx.lineTo(i*w*.075,h*.37);ctx.stroke();}
      ctx.fillStyle=COLORS.cyan;ctx.shadowColor=COLORS.cyan;ctx.shadowBlur=12;[-.3,-.18,.18,.3].forEach(n=>{ctx.beginPath();ctx.arc(n*w,h*.12,h*.035,0,TAU);ctx.fill();});ctx.restore();
    }

    function drawRooAt(x,y,rotation,height,demo) {
      const suit=currentSuit();
      ctx.save();ctx.translate(x,y);ctx.rotate(rotation);
      if(demo) ctx.rotate(Math.sin(performance.now()*.002)*.025);
      ctx.shadowColor=suit.color;ctx.shadowBlur=charging?20:8;
      if(rooImage.complete&&rooImage.naturalWidth) {
        const w=height*(rooImage.naturalWidth/rooImage.naturalHeight);
        ctx.filter=suit.filter;
        ctx.drawImage(rooImage,-w*.5,-height,w,height);
        ctx.filter="none";
        ctx.shadowBlur=0;
        drawSuitDetails(suit,w,height);
      } else drawFallbackRoo(height,suit.color);
      if(charging&&!demo) {
        ctx.strokeStyle=predictedHit?COLORS.gold:suit.color;ctx.globalAlpha=.65;ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,-height*.5,height*.43+charge*8,0,TAU*charge);ctx.stroke();
      }
      ctx.restore();
    }

    // DISTINCT KIT DETAILS — compact emblems and suit-panel markings layered onto the same kangaroo art.
    function drawSuitDetails(suit,w,h) {
      ctx.save();ctx.strokeStyle=suit.color;ctx.fillStyle=suit.color;ctx.lineWidth=Math.max(1.5,h*.022);ctx.lineCap="round";
      const cx=w*.1,cy=-h*.48,size=Math.max(3,h*.055);
      if (suit.id==="classic") { ctx.beginPath();ctx.arc(w*.18,cy,size*.55,0,TAU);ctx.fill(); }
      if (suit.id==="azure") { [-1,1].forEach(n=>{ctx.beginPath();ctx.moveTo(cx-size*1.2,cy+n*size*.65);ctx.lineTo(cx,cy+n*size*.15);ctx.lineTo(cx+size*1.2,cy+n*size*.65);ctx.stroke();}); }
      if (suit.id==="solar") { ctx.beginPath();ctx.arc(cx,cy,size*.75,0,TAU);ctx.fill();for(let i=0;i<8;i++){const a=i*TAU/8;ctx.beginPath();ctx.moveTo(cx+Math.cos(a)*size,cy+Math.sin(a)*size);ctx.lineTo(cx+Math.cos(a)*size*1.45,cy+Math.sin(a)*size*1.45);ctx.stroke();} }
      if (suit.id==="midnight") { ctx.beginPath();ctx.arc(cx,cy,size,Math.PI*.35,Math.PI*1.65);ctx.stroke();ctx.beginPath();ctx.arc(cx+size*.48,cy,size*.78,Math.PI*.55,Math.PI*1.45,true);ctx.stroke(); }
      if (suit.id==="blossom") { for(let i=0;i<5;i++){const a=i*TAU/5;ctx.beginPath();ctx.ellipse(cx+Math.cos(a)*size*.65,cy+Math.sin(a)*size*.65,size*.55,size*.3,a,0,TAU);ctx.fill();}ctx.fillStyle=COLORS.cream;ctx.beginPath();ctx.arc(cx,cy,size*.3,0,TAU);ctx.fill(); }
      ctx.restore();
    }

    function drawFallbackRoo(h,accent) {
      const s=h/80;ctx.scale(s,s);ctx.shadowBlur=0;
      ctx.fillStyle="#d57a3e";ctx.beginPath();ctx.ellipse(0,-31,16,23,0,0,TAU);ctx.fill();
      ctx.beginPath();ctx.ellipse(-8,-59,5,17,-.15,0,TAU);ctx.ellipse(7,-60,5,18,.15,0,TAU);ctx.fill();
      ctx.strokeStyle="#d57a3e";ctx.lineWidth=7;ctx.lineCap="round";ctx.beginPath();ctx.moveTo(-8,-18);ctx.quadraticCurveTo(-27,-8,-34,-2);ctx.stroke();
      ctx.fillStyle="#fff2d5";ctx.beginPath();ctx.roundRect(-15,-33,30,28,9);ctx.fill();ctx.strokeStyle=accent;ctx.lineWidth=3;ctx.stroke();
      ctx.strokeStyle="#fff2d5";ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,-47,20,0,TAU);ctx.stroke();
      ctx.fillStyle="#211a2d";ctx.beginPath();ctx.arc(8,-36,2,0,TAU);ctx.fill();
    }

    function drawParticle(p) {
      const a=clamp(p.life/p.max,0,1);ctx.globalAlpha=a;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y-cameraY,p.size*a,0,TAU);ctx.fill();ctx.globalAlpha=1;
    }

    function drawFloater(f) {
      const a=clamp(f.life/f.max,0,1);ctx.save();ctx.globalAlpha=Math.min(1,a*2);ctx.fillStyle=f.color;ctx.font="900 13px 'Courier New',monospace";ctx.textAlign="center";ctx.shadowColor=COLORS.ink;ctx.shadowBlur=5;ctx.fillText(f.text,f.x,f.y-cameraY);ctx.restore();
    }

    function update(now,dt) {
      if(scene==="playing") stepPlaying(dt);
      else if(scene==="menu") menuOrbit-=dt*.24;
    }

    function render(now) {
      ctx.setTransform(DPR,0,0,DPR,0,0);
      drawBackground(now);
      if(["menu","about","partysetup","suits","singlesetup","scores"].includes(scene)) drawMenu(now);
      else drawGame(now);
    }

    function frame(now) {
      const dt=Math.min(.033,Math.max(0,(now-lastTime)/1000));lastTime=now;
      update(now,dt);render(now);requestAnimationFrame(frame);
    }

    resize();
    updateSoundButton();
    showMenu();
    requestAnimationFrame(frame);
  })();
  </script>
</body>
