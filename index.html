<!doctype html>
<!-- Star Hop production build -->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
  <meta name="theme-color" content="#0c0b1d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Star Hop">
  <meta name="description" content="Hop across space, collect stars and chase the high score.">
  <meta property="og:title" content="Star Hop">
  <meta property="og:description" content="Hop across space, collect stars and chase the high score.">
  <meta property="og:url" content="https://boredspaceroo.github.io/starhop">
  <meta property="og:type" content="website">
  <!-- Replace this path if the final square Star Hop artwork uses a different filename or public URL. -->
  <meta property="og:image" content="https://boredspaceroo.github.io/starhop/assets/star-hop-share.jpg">
  <meta property="og:image:alt" content="Star Hop — a kangaroo astronaut hopping across colourful planets">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Star Hop">
  <meta name="twitter:description" content="Hop across space, collect stars and chase the high score.">
  <meta name="twitter:image" content="https://boredspaceroo.github.io/starhop/assets/star-hop-share.jpg">
  <meta name="twitter:image:alt" content="Star Hop — a kangaroo astronaut hopping across colourful planets">
  <title>Star Hop</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #0c0b1d;
      --indigo: #15142b;
      --cream: #fff2d5;
      --apricot: #ffb56b;
      --gold: #ffd36a;
      --coral: #f26b5e;
      --lavender: #817ca8;
      --muted: #b7b0cf;
      --safe-top: max(16px, env(safe-area-inset-top));
      --safe-right: max(16px, env(safe-area-inset-right));
      --safe-bottom: max(16px, env(safe-area-inset-bottom));
      --safe-left: max(16px, env(safe-area-inset-left));
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #070612;
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }

    body {
      font-family: ui-rounded, "Avenir Next", "Arial Rounded MT Bold", system-ui, -apple-system, sans-serif;
      color: var(--cream);
    }

    button { font: inherit; }

    button:focus-visible {
      outline: 3px solid var(--cream);
      outline-offset: 3px;
    }

    #stage {
      position: relative;
      width: min(100%, 520px);
      height: 100dvh;
      min-height: 480px;
      margin: 0 auto;
      overflow: hidden;
      isolation: isolate;
      background: var(--ink);
      box-shadow: 0 0 80px rgba(0,0,0,.65);
    }

    #stage::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 8;
      pointer-events: none;
      opacity: .15;
      mix-blend-mode: soft-light;
      background-image:
        repeating-radial-gradient(circle at 20% 40%, transparent 0 2px, rgba(255,242,213,.12) 3px 4px);
      background-size: 7px 7px;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 0;
      touch-action: none;
    }

    .hud {
      position: absolute;
      z-index: 5;
      inset: 0 0 auto;
      padding: var(--safe-top) var(--safe-right) 0 var(--safe-left);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: start;
      gap: 8px;
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
    }

    .hud.hidden { opacity: 0; transform: translateY(-12px); }

    .hud-left { min-width: 70px; }

    .proton-hud {
      width: 66px;
      height: 66px;
      margin-top: 0;
      display: grid;
      place-items: center;
      filter: drop-shadow(0 5px 12px rgba(0,0,0,.32));
    }

    .atom {
      position: relative;
      width: 62px;
      height: 62px;
      display: block;
    }

    .atom-nucleus {
      position: absolute;
      z-index: 3;
      width: 15px;
      height: 15px;
      inset: 23.5px;
      border-radius: 50%;
      background: radial-gradient(circle at 34% 30%, #f4efff 0 13%, #b6a6ff 26%, #7962ec 70%, #40318f 100%);
      box-shadow: 0 0 7px #b7a8ff, 0 0 17px rgba(128,104,255,.7);
    }

    .atom-orbit {
      position: absolute;
      inset: 0;
      transform: rotate(var(--orbit-angle));
    }

    .atom-orbit::before {
      content: "";
      position: absolute;
      inset: 20px 3px;
      border: 1.25px solid rgba(190,181,255,.58);
      border-radius: 50%;
      box-shadow: inset 0 0 5px rgba(128,104,255,.18), 0 0 5px rgba(128,104,255,.12);
    }

    .atom-orbit:nth-child(2) { --orbit-angle: 0deg; }
    .atom-orbit:nth-child(3) { --orbit-angle: 60deg; }
    .atom-orbit:nth-child(4) { --orbit-angle: -60deg; }

    .atom-particle {
      position: absolute;
      z-index: 4;
      width: 7px;
      height: 7px;
      top: 27.5px;
      left: 27.5px;
      border-radius: 50%;
      opacity: 1;
      background: #fff8df;
      box-shadow: 0 0 5px #fff, 0 0 11px #a994ff;
      offset-path: ellipse(27px 10px at 3.5px 3.5px);
      offset-rotate: 0deg;
      animation: atom-particle-orbit var(--particle-speed) linear infinite;
      transition: opacity .2s ease, scale .2s ease;
    }

    .atom-particle.is-empty { opacity: 0; scale: .3; animation-play-state: paused; }
    .atom-orbit:nth-child(2) .atom-particle { --particle-speed: 4.8s; animation-delay: -.35s; }
    .atom-orbit:nth-child(3) .atom-particle { --particle-speed: 5.7s; animation-delay: -2.35s; animation-direction: reverse; }
    .atom-orbit:nth-child(4) .atom-particle { --particle-speed: 6.5s; animation-delay: -4.75s; }

    .score-stack {
      min-width: 112px;
      padding: 7px 13px 8px;
      border: 1px solid rgba(255,211,106,.48);
      border-radius: 16px;
      text-align: center;
      background: rgba(12,11,29,.72);
      backdrop-filter: blur(8px);
      box-shadow: 0 5px 18px rgba(0,0,0,.2);
    }

    .score-stack small {
      display: block;
      color: var(--apricot);
      font-size: 9px;
      font-weight: 900;
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    .score-stack strong {
      display: block;
      margin-top: -1px;
      font-family: "Courier New", ui-monospace, monospace;
      color: var(--cream);
      font-size: 24px;
      line-height: 1;
      letter-spacing: -.06em;
    }

    .boss-health {
      position: absolute;
      top: calc(var(--safe-top) + 55px);
      left: 50%;
      width: min(44vw, 184px);
      padding: 5px 8px 7px;
      border: 1px solid rgba(139,229,255,.46);
      border-radius: 12px;
      background: rgba(12,11,29,.78);
      box-shadow: 0 6px 18px rgba(0,0,0,.25);
      transform: translateX(-50%);
      transition: opacity .2s ease, transform .2s ease;
    }

    .boss-health.hidden { opacity: 0; transform: translate(-50%,-8px); }
    .boss-health span { display: block; margin-bottom: 4px; color: #9deaff; font: 900 8px/1 "Courier New", monospace; letter-spacing: .14em; text-align: center; text-transform: uppercase; }
    .boss-health-track { height: 6px; overflow: hidden; border-radius: 999px; background: rgba(255,242,213,.12); }
    .boss-health-fill { width: 100%; height: 100%; border-radius: inherit; background: linear-gradient(90deg,#71d6d1,#b7a8ff,#f28ca5); box-shadow: 0 0 10px rgba(113,214,209,.65); transition: width .24s ease; }

    .hud-actions {
      justify-self: end;
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }

    .icon-button {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      padding: 0;
      border: 1px solid rgba(255,211,106,.52);
      border-radius: 50%;
      color: var(--cream);
      background: rgba(12,11,29,.74);
      box-shadow: 0 5px 18px rgba(0,0,0,.22);
      backdrop-filter: blur(8px);
      cursor: pointer;
    }

    .icon-button:active { transform: translateY(2px) scale(.96); }
    .icon-button svg { width: 20px; height: 20px; fill: currentColor; }

    .screen {
      position: absolute;
      inset: 0;
      z-index: 4;
      display: flex;
      flex-direction: column;
      padding: calc(var(--safe-top) + 8px) var(--safe-right) calc(var(--safe-bottom) + 4px) var(--safe-left);
      transition: opacity .22s ease, visibility .22s ease;
      overflow-x: hidden;
      overflow-y: auto;
      touch-action: pan-y;
    }

    .screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .menu-head { text-align: center; pointer-events: none; }

    .eyebrow {
      margin: 0 0 5px;
      color: var(--gold);
      font: 800 9px/1.2 "Courier New", monospace;
      letter-spacing: .24em;
      text-transform: uppercase;
    }

    /* Recommended production logo: transparent PNG, roughly 1200–1600px wide,
       3:1–4:1 aspect ratio, tightly cropped with a small transparent safety margin. */
    .logo-frame {
      width: min(82vw, 390px);
      min-height: 74px;
      max-height: 126px;
      margin: 2px auto 0;
      display: grid;
      place-items: center;
    }

    .game-logo {
      display: block;
      width: 100%;
      max-width: 390px;
      max-height: 122px;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 5px 0 rgba(74,30,35,.46));
      animation: logo-arrive .5s cubic-bezier(.2,.8,.25,1) both, logo-breathe 7s ease-in-out .6s infinite;
    }

    .logo-fallback { color: var(--cream); font-family: Impact, sans-serif; font-size: 48px; letter-spacing: .04em; text-transform: uppercase; }

    .menu-space { flex: 1 1 auto; min-height: 154px; pointer-events: none; }

    .menu-actions {
      width: min(100%, 430px);
      margin: 0 auto;
      display: grid;
      gap: 10px;
    }

    .button {
      position: relative;
      min-height: 52px;
      padding: 12px 18px;
      border: 0;
      border-radius: 18px;
      color: var(--cream);
      background: rgba(21,20,43,.88);
      box-shadow: 0 5px 0 rgba(4,3,12,.62), inset 0 0 0 1px rgba(255,211,106,.34);
      font-weight: 900;
      letter-spacing: .06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform .12s ease, box-shadow .12s ease, filter .12s ease;
      touch-action: manipulation;
    }

    .button:active {
      transform: translateY(4px) scale(.99);
      box-shadow: 0 1px 0 rgba(4,3,12,.62), inset 0 0 0 1px rgba(255,211,106,.34);
    }

    .button.primary {
      min-height: 66px;
      border-radius: 22px;
      color: #17132b;
      background: linear-gradient(180deg, #ffd37c, var(--apricot));
      box-shadow: 0 7px 0 #c94f45, inset 0 2px 0 rgba(255,255,255,.36), 0 14px 28px rgba(0,0,0,.25);
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      font-size: 29px;
      letter-spacing: .08em;
      animation: breathe 2.8s ease-in-out infinite;
    }

    .button.primary:active {
      transform: translateY(5px) scale(.99);
      box-shadow: 0 2px 0 #c94f45, inset 0 2px 0 rgba(255,255,255,.24), 0 6px 14px rgba(0,0,0,.2);
    }

    .mode-row { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }

    .mode-button {
      min-height: 57px;
      padding: 9px 10px;
      font-size: 12px;
      letter-spacing: .08em;
    }

    .mode-button small {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 8px;
      font-weight: 700;
      letter-spacing: .05em;
      text-transform: none;
    }

    .menu-meta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--cream);
      font: 800 11px/1 "Courier New", monospace;
      letter-spacing: .08em;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 35px;
      padding: 8px 12px;
      border: 1px solid rgba(255,211,106,.28);
      border-radius: 999px;
      background: rgba(12,11,29,.7);
      color: var(--cream);
      cursor: pointer;
    }

    .pill b { color: var(--gold); }

    .microcopy {
      margin: 0;
      text-align: center;
      color: var(--muted);
      font: 800 9px/1.3 "Courier New", monospace;
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    .panel {
      width: min(100%, 430px);
      margin: auto;
      padding: 22px 18px 20px;
      border: 1px solid rgba(255,211,106,.52);
      border-radius: 26px;
      background: rgba(15,13,33,.92);
      box-shadow: 0 20px 60px rgba(0,0,0,.44), inset 0 0 30px rgba(129,124,168,.06);
      backdrop-filter: blur(14px);
      text-align: center;
    }

    .panel-kicker {
      margin: 0 0 7px;
      color: var(--apricot);
      font: 900 10px/1 "Courier New", monospace;
      letter-spacing: .2em;
      text-transform: uppercase;
    }

    .panel h2 {
      margin: 0;
      color: var(--cream);
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      font-size: clamp(38px, 11vw, 52px);
      font-weight: 900;
      line-height: .95;
      letter-spacing: .035em;
      text-transform: uppercase;
    }

    .panel p {
      margin: 12px auto 18px;
      max-width: 320px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .about-panel { margin: 44px auto 0; padding-top: 16px; }
    .about-art-wrap { width: min(58vw, 224px); aspect-ratio: 1; margin: 12px auto 15px; overflow: hidden; border: 1px solid rgba(255,211,106,.36); border-radius: 20px; background: rgba(255,242,213,.04); box-shadow: 0 12px 30px rgba(0,0,0,.28); }
    .about-art { width: 100%; height: 100%; display: block; object-fit: cover; }
    .about-art-fallback { height: 100%; display: grid; place-items: center; padding: 16px; color: var(--lavender); font: 900 10px/1.4 "Courier New", monospace; text-transform: uppercase; }
    .control-mantra { display: grid; grid-template-columns: repeat(3,1fr); gap: 7px; margin: 13px 0 15px; }
    .control-mantra div { padding: 10px 5px; border: 1px solid rgba(255,211,106,.2); border-radius: 13px; background: rgba(255,242,213,.045); }
    .control-mantra strong { display: block; color: var(--gold); font: 900 13px/1 "Courier New", monospace; letter-spacing: .08em; }
    .control-mantra span { display: block; margin-top: 5px; color: var(--muted); font-size: 9px; line-height: 1.25; }
    .about-copy { margin: 0 0 15px; display: grid; gap: 7px; text-align: left; }
    .about-copy p { max-width: none; margin: 0; padding-left: 14px; position: relative; font-size: 11px; }
    .about-copy p::before { content: "✦"; position: absolute; left: 0; color: var(--apricot); }

    .device-progress { margin: 14px 0 16px; padding: 12px; border: 1px solid rgba(255,211,106,.2); border-radius: 15px; background: rgba(255,242,213,.045); text-align: left; }
    .device-progress-label { display: flex; justify-content: space-between; gap: 10px; color: var(--muted); font: 900 9px/1.3 "Courier New", monospace; text-transform: uppercase; }
    .device-progress-label strong { color: var(--gold); }
    .device-progress-track { height: 7px; margin-top: 8px; overflow: hidden; border-radius: 999px; background: rgba(255,242,213,.1); }
    .device-progress-fill { height: 100%; border-radius: inherit; background: linear-gradient(90deg,var(--apricot),var(--gold)); }

    .mission-reason { margin: 7px auto 10px !important; font-size: 11px !important; }

    .result-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      margin: 11px 0 5px;
    }

    .result-meta div {
      padding: 9px 7px;
      border: 1px solid rgba(255,211,106,.2);
      border-radius: 13px;
      background: rgba(255,242,213,.05);
    }

    .result-meta span { display: block; color: var(--lavender); font-size: 8px; font-weight: 900; letter-spacing: .1em; text-transform: uppercase; }
    .result-meta strong { display: block; margin-top: 3px; color: var(--gold); font: 900 17px/1 "Courier New", monospace; }

    .identity-chip {
      width: max-content;
      max-width: 100%;
      margin: 8px auto 0;
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--cream);
      font: 900 10px/1 "Courier New", monospace;
      text-transform: uppercase;
    }

    .identity-chip button { min-height: 32px; padding: 6px 10px; border-radius: 999px; font-size: 8px; }

    .big-score {
      margin: 11px 0 2px;
      color: var(--gold);
      font: 900 clamp(54px, 17vw, 80px)/.9 "Courier New", monospace;
      letter-spacing: -.09em;
      text-shadow: 0 5px 0 rgba(201,79,69,.6);
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
      margin: 16px 0;
    }

    .stat {
      padding: 11px 5px;
      border-radius: 14px;
      background: rgba(255,242,213,.055);
      border: 1px solid rgba(255,211,106,.16);
    }

    .stat strong { display: block; color: var(--cream); font: 900 18px/1 "Courier New", monospace; }
    .stat small { display: block; margin-top: 5px; color: var(--lavender); font-size: 8px; font-weight: 900; letter-spacing: .12em; text-transform: uppercase; }

    .panel-actions { display: grid; gap: 9px; }
    .panel-actions.two { grid-template-columns: 1.35fr .65fr; }

    .back-button {
      position: absolute;
      z-index: 2;
      top: calc(var(--safe-top) + 5px);
      left: var(--safe-left);
    }

    .setup-options {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 18px 0 20px;
    }

    .number-choice {
      min-height: 67px;
      border: 1px solid rgba(255,211,106,.28);
      border-radius: 17px;
      color: var(--cream);
      background: rgba(255,242,213,.05);
      font: 900 24px/1 "Courier New", monospace;
      cursor: pointer;
    }

    .number-choice small { display: block; margin-top: 5px; color: var(--muted); font: 800 8px/1 system-ui; letter-spacing: .1em; text-transform: uppercase; }
    .number-choice.selected { color: var(--ink); background: var(--gold); border-color: var(--gold); }

    .scoreboard { display: grid; gap: 7px; margin: 17px 0; text-align: left; }
    .score-line { display: flex; justify-content: space-between; padding: 11px 13px; border-radius: 13px; background: rgba(255,242,213,.05); font: 900 13px/1 "Courier New", monospace; }
    .score-line.winner { color: var(--ink); background: var(--gold); }
    .score-line span { min-width: 0; overflow-wrap: anywhere; }
    .score-line strong { flex: 0 0 auto; margin-left: 9px; }

    .suit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 16px 0 18px; }
    .suit-card { min-height: 76px; padding: 10px; border: 1px solid rgba(255,211,106,.2); border-radius: 16px; color: var(--cream); background: rgba(255,242,213,.04); text-align: left; cursor: pointer; }
    .suit-card.selected { border-color: var(--gold); background: rgba(255,211,106,.12); }
    .suit-card.locked { opacity: .5; }
    .suit-swatch { position: relative; width: 28px; height: 28px; margin-bottom: 7px; border: 2px solid rgba(255,242,213,.48); border-radius: 9px 50% 50%; background: var(--swatch); box-shadow: 0 0 16px var(--swatch); }
    .suit-swatch::after { content: attr(data-emblem); position: absolute; inset: 0; display: grid; place-items: center; color: #17132b; font: 900 12px/1 system-ui; }
    .suit-card strong { display: block; font-size: 11px; letter-spacing: .08em; text-transform: uppercase; }
    .suit-card small { color: var(--muted); font-size: 8px; }

    .power-dock {
      position: absolute;
      z-index: 5;
      left: var(--safe-left);
      right: var(--safe-right);
      bottom: calc(var(--safe-bottom) + 4px);
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
    }

    .power-dock.hidden { opacity: 0; transform: translateY(20px); }

    .power-card {
      width: min(100%, 380px);
      margin: 0 auto;
      padding: 11px 14px 12px;
      border: 1px solid rgba(255,211,106,.42);
      border-radius: 18px;
      background: rgba(12,11,29,.8);
      box-shadow: 0 8px 24px rgba(0,0,0,.25);
      backdrop-filter: blur(8px);
    }

    .power-labels { display: flex; justify-content: space-between; margin-bottom: 7px; color: var(--cream); font: 900 9px/1 "Courier New", monospace; letter-spacing: .12em; text-transform: uppercase; }
    #powerReadout { color: var(--apricot); }
    .power-track { height: 7px; overflow: hidden; border-radius: 999px; background: rgba(255,242,213,.12); }
    .power-fill { width: 12%; height: 100%; border-radius: inherit; background: linear-gradient(90deg, var(--apricot), var(--gold), var(--coral)); box-shadow: 0 0 12px rgba(255,181,107,.7); transform-origin: left; }

    .tip {
      position: absolute;
      z-index: 5;
      left: 50%;
      bottom: calc(var(--safe-bottom) + 83px);
      transform: translateX(-50%);
      width: max-content;
      max-width: calc(100% - 40px);
      padding: 8px 13px;
      border-radius: 999px;
      color: var(--ink);
      background: var(--cream);
      box-shadow: 0 4px 0 var(--coral);
      font: 900 10px/1.1 "Courier New", monospace;
      letter-spacing: .08em;
      text-align: center;
      text-transform: uppercase;
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
    }

    .tip.hidden { opacity: 0; transform: translate(-50%, 8px); }

    .toast {
      position: absolute;
      z-index: 10;
      top: calc(var(--safe-top) + 66px);
      left: 50%;
      transform: translate(-50%, -8px);
      width: max-content;
      max-width: calc(100% - 40px);
      padding: 9px 14px;

    .score-details { padding: 0 11px 11px 51px; color: var(--muted); font: 800 9px/1.45 "Courier New", monospace; }
    .score-details span { display: block; }
    .sync-note { margin: 8px auto !important; color: var(--lavender) !important; font: 800 8px/1.3 "Courier New", monospace !important; letter-spacing: .07em; text-transform: uppercase; }

    @keyframes atom-particle-orbit { from { offset-distance: 0%; } to { offset-distance: 100%; } }
    @keyframes logo-arrive { from { opacity: 0; transform: scale(.9); } to { opacity: 1; transform: scale(1); } }
    @keyframes logo-breathe { 0%,88%,100% { transform: scale(1); filter: drop-shadow(0 5px 0 rgba(74,30,35,.46)); } 44% { transform: scale(1.012); } 92% { filter: drop-shadow(0 5px 0 rgba(74,30,35,.46)) drop-shadow(0 0 10px rgba(255,211,106,.24)); } }

    @media (max-height: 670px) {

    @media (min-width: 560px) {

    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .001ms !important; animation-iteration-count: 1 !important; scroll-behavior: auto !important; }
      .atom-particle { animation: none !important; offset-distance: var(--static-offset, 0%); }
      .atom-orbit:nth-child(2) .atom-particle { --static-offset: 8%; }
      .atom-orbit:nth-child(3) .atom-particle { --static-offset: 42%; }
      .atom-orbit:nth-child(4) .atom-particle { --static-offset: 76%; }

<body>
  <main id="stage" aria-label="Star Hop game">
    <canvas id="gameCanvas" aria-label="A kangaroo astronaut hopping between planets"></canvas>

    <header id="hud" class="hud hidden" aria-label="Game score and controls">
      <div class="hud-left">
        <div id="protonHud" class="proton-hud" role="status" aria-label="Protons: 0 of 3">
          <span class="atom" aria-hidden="true">
            <span class="atom-nucleus"></span>
            <span class="atom-orbit"><i class="atom-particle is-empty"></i></span>
            <span class="atom-orbit"><i class="atom-particle is-empty"></i></span>
            <span class="atom-orbit"><i class="atom-particle is-empty"></i></span>
          </span>
        </div>
      </div>
      <div class="score-stack"><small id="scoreMode">Voyage</small><strong id="scoreValue">000</strong></div>
      <div class="hud-actions">
        <button id="soundButton" class="icon-button" type="button" aria-label="Mute sound"></button>
        <button id="pauseButton" class="icon-button" type="button" aria-label="Pause game"></button>
      </div>
      <div id="bossHealth" class="boss-health hidden" role="status" aria-label="Alien boss health">
        <span>Alien command</span><div class="boss-health-track"><div id="bossHealthFill" class="boss-health-fill"></div></div>
      </div>
    </header>

    <section id="screen" class="screen" aria-live="polite"></section>

    <div id="powerDock" class="power-dock hidden" aria-hidden="true">
      <div class="power-card">
        <div class="power-labels"><span id="launchLabel">Hold to launch</span><span id="powerReadout">Ready</span></div>
        <div class="power-track"><div id="powerFill" class="power-fill"></div></div>
      </div>
    </div>

    <div id="tip" class="tip hidden">Hold anywhere • release to leap</div>
    <div id="toast" class="toast" role="status"></div>
    <div id="announcer" class="sr-only" aria-live="assertive"></div>

    <div class="rotate-note">
      <div><strong>Rotate the mission</strong><span>Star Hop is happiest in portrait.</span></div>
    </div>
  </main>

  <script>
  (() => {
    "use strict";

    const $ = (q) => document.querySelector(q);
    const stage = $("#stage");
    const canvas = $("#gameCanvas");
    const ctx = canvas.getContext("2d", { alpha: false, desynchronized: true });
    const screen = $("#screen");
    const hud = $("#hud");
    const scoreValue = $("#scoreValue");
    const scoreMode = $("#scoreMode");
    const soundButton = $("#soundButton");
    const pauseButton = $("#pauseButton");
    const powerDock = $("#powerDock");
    const powerFill = $("#powerFill");
    const powerReadout = $("#powerReadout");
    const launchLabel = $("#launchLabel");
    const tip = $("#tip");
    const toast = $("#toast");
    const announcer = $("#announcer");
    const protonHud = $("#protonHud");
    const protonParticles = [...document.querySelectorAll(".atom-particle")];
    const bossHealth = $("#bossHealth");
    const bossHealthFill = $("#bossHealthFill");

    // STAR HOP CONFIGURATION
    const MAX_PLAYER_NAME_LENGTH = 8;
    const MAX_PROTONS = 3;
    const LANDMARK_BASE_INTERVAL = 6;
    const FULL_PROTON_SCORE_BONUS = 500;
    const BOSS_PROTON_OVERFLOW_BONUS = 250;
    const BOSS_HIT_SCORE_BONUS = 250;
    const BOSS_VICTORY_SCORE_BONUS = 1500;
    const BOSS_BASE_HITS = 3;
    const BOSS_MAX_HITS = 5;
    const TRACTOR_BEAM_WARNING_MS = 1350;
    const TRACTOR_BEAM_ACTIVE_MS = 2600;
    const TRACTOR_BEAM_ABDUCTION_MS = 1400;
    const BOSS_GRACE_MS = 1150;
    const MAX_EFFECT_PARTICLES = 150;
    const BACKGROUND_MUSIC_PATH = "assets/background-music.mp3";
    const BOSS_MUSIC_PATH = "assets/boss-fight-music.mp3";

    /* FUTURE CLOUDFLARE CONTRACT (no network is used while this is empty):
       GET /leaderboard -> {entries:[normalisedScore],totalAttempts};
       POST /scores <- {name,score,starsCollected,bestCombo,perfects,planets,mode,playerCount}
                    -> {accepted,entry,rank,bestForName,madeTopTen,totalAttempts};
       GET /player?name=CHAY -> {name,entries:[normalisedScore]} (max 10, exact name).
       D1 fields: id,name,score,stars_collected,best_combo,perfects,planets,mode,
       player_count,created_at. The Worker owns its atomic total-attempt counter. */
    // Insert only the public Cloudflare Worker URL here when the backend is ready.
    const LEADERBOARD_API_URL = "";
    const SHOW_DEMO_RECORDS = true; // Set false to show only genuine This Session records while local.

    // Change this when the public Star Hop URL changes. Keep the matching static meta URLs in <head> in sync.
    const STAR_HOP_GAME_URL = "https://boredspaceroo.github.io/starhop";

    const COLORS = {
      ink: "#0c0b1d", indigo: "#15142b", cream: "#fff2d5", apricot: "#ffb56b",
      gold: "#ffd36a", coral: "#f26b5e", lavender: "#817ca8", mint: "#8fc6a5",
      cyan: "#71d6d1", rose: "#f28ca5"
    };

    const SUITS = [
      { id: "classic", name: "Classic", need: 0, color: COLORS.apricot, filter: "none", emblem: "●" },
      { id: "azure", name: "Blue Orbit", need: 20, color: COLORS.cyan, filter: "hue-rotate(130deg) saturate(1.35)", emblem: "≋" },
      { id: "solar", name: "Solar Gold", need: 60, color: COLORS.gold, filter: "sepia(.55) saturate(1.55) brightness(1.05)", emblem: "☀" },
      { id: "midnight", name: "Night Shift", need: 120, color: "#9b8cff", filter: "hue-rotate(225deg) saturate(1.35) brightness(.82)", emblem: "☾" },
      { id: "blossom", name: "Star Blossom", need: 220, color: COLORS.rose, filter: "hue-rotate(300deg) saturate(1.35) brightness(1.06)", emblem: "✿" }
    ];

    const ICONS = {
      sound: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 9v6h4l5 4V5L8 9H4zm12.5 3a4.5 4.5 0 0 0-2.1-3.8v7.6a4.5 4.5 0 0 0 2.1-3.8zm-2.1-8.2v2.1a7 7 0 0 1 0 12.2v2.1a9 9 0 0 0 0-16.4z"/></svg>',
      mute: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 9v6h4l5 4V5L8 9H4zm11.4.1L14 10.5l1.5 1.5-1.5 1.5 1.4 1.4 1.5-1.5 1.5 1.5 1.4-1.4-1.5-1.5 1.5-1.5-1.4-1.4-1.5 1.5-1.5-1.5z"/></svg>',
      pause: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 5h4v14H7zm6 0h4v14h-4z"/></svg>'
    };

    const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
    const lerp = (a, b, t) => a + (b - a) * t;
    const easeOut = (t) => 1 - Math.pow(1 - t, 3);
    const TAU = Math.PI * 2;
    const reducedMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;

    function mulberry32(seed) {
      return function() {
        let t = seed += 0x6d2b79f5;
        t = Math.imul(t ^ t >>> 15, t | 1);
        t ^= t + Math.imul(t ^ t >>> 7, t | 61);
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }

    function hashString(value) {
      let h = 2166136261;
      for (let i = 0; i < value.length; i++) {
        h ^= value.charCodeAt(i);
        h = Math.imul(h, 16777619);
      }
      return h >>> 0;
    }

    function dateKey() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    }

    // Keep the original key so existing players retain their best score, stars and unlocked kits after the rename.
    const STORE_KEY = "bored-space-roo-v1";
    const IDENTITY_SESSION_KEY = "star-hop-identities-v1";
    const defaults = {
      best: 0, totalStars: 0, jumps: 0, landings: 0, runs: 0, suit: "classic",
      sound: true, haptics: true, tutorialSeen: false, daily: {}
    };

    function loadSave() {
      try {
        const parsed = JSON.parse(localStorage.getItem(STORE_KEY) || "{}");
        return { ...defaults, ...parsed, daily: { ...defaults.daily, ...(parsed.daily || {}) } };
      } catch { return { ...defaults, daily: {} }; }
    }

    let save = loadSave();
    function persist() {
      try { localStorage.setItem(STORE_KEY, JSON.stringify(save)); } catch {}
    }

    function vibrate(pattern = 10) {
      if (save.haptics && navigator.vibrate) navigator.vibrate(pattern);
    }

    // SESSION IDENTITY MANAGEMENT
    function loadIdentities() {
      const fallback = { singleName: "", partyNames: ["", "", "", ""] };
      try {
        const parsed = JSON.parse(sessionStorage.getItem(IDENTITY_SESSION_KEY) || "{}");
        return {
          singleName: typeof parsed.singleName === "string" ? parsed.singleName : "",
          partyNames: Array.from({length:4}, (_,i) => typeof parsed.partyNames?.[i] === "string" ? parsed.partyNames[i] : "")
        };
      } catch { return fallback; }
    }

    let identities = loadIdentities();
    function persistIdentities() {
      try { sessionStorage.setItem(IDENTITY_SESSION_KEY, JSON.stringify(identities)); } catch {}
    }

    function normaliseName(value) { return String(value ?? "").trim().toUpperCase(); }
    function validateName(value) {
      const name = normaliseName(value);
      if (!name) return { valid:false, name, message:"Your flight badge needs a name." };
      if (name.length > MAX_PLAYER_NAME_LENGTH) return { valid:false, name, message:"Keep it to eight characters, space cadet." };
      if (!/^[A-Z0-9]+$/.test(name)) return { valid:false, name, message:"Letters and numbers only — no spaces or symbols." };
      return { valid:true, name, message:"" };
    }

    const FUNNY_NAME_PREFIXES = ["MOON","HOP","SUN","ROO","STAR","BOING","NOVA","ORBIT","ZAP","COSMO","DUST","JET"];
    const FUNNY_NAME_SUFFIXES = ["ROO","BOT","BUN","PAW","POP","ZIP","BEAN","7","42","ZOOM","HOP","BOOP"];
    function randomFunnyName() {
      for (let i=0;i<20;i++) {
        const name = `${FUNNY_NAME_PREFIXES[Math.floor(Math.random()*FUNNY_NAME_PREFIXES.length)]}${FUNNY_NAME_SUFFIXES[Math.floor(Math.random()*FUNNY_NAME_SUFFIXES.length)]}`;
        if (name.length <= MAX_PLAYER_NAME_LENGTH) return name;
      }
      return `ROO${Math.floor(10+Math.random()*90)}`;
    }

    function escapeHTML(value) {
      return String(value).replace(/[&<>'"]/g, char => ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"})[char]);
    }

    function attemptToken() {
      return crypto.randomUUID?.() || `${Date.now().toString(36)}-${Math.random().toString(36).slice(2)}`;
    }

    // AUDIO STATE MANAGEMENT — one stable object per track, with mutually exclusive menu/game/boss states.
    const AUDIO_STATE = Object.freeze({ SILENT_MENU:"silent-menu", GAMEPLAY:"gameplay", BOSS:"boss", VICTORY:"victory" });
    class AudioEngine {
      constructor() {
        this.context = null;
        this.master = null;
        this.state = AUDIO_STATE.SILENT_MENU;
        this.musicTrack = new Audio(BACKGROUND_MUSIC_PATH);
        this.musicTrack.loop = true;
        this.musicTrack.preload = "auto";
        this.musicTrack.volume = .34;
        this.bossTrack = new Audio(BOSS_MUSIC_PATH);
        this.bossTrack.loop = true;
        this.bossTrack.preload = "auto";
        this.bossTrack.volume = .38;
      }
      unlock() {
        if (!this.context) {
          const AC = window.AudioContext || window.webkitAudioContext;
          if (AC) {
            this.context = new AC();
            this.master = this.context.createGain();
            this.master.gain.value = .34;
            this.master.connect(this.context.destination);
          }
        }
        if (this.context?.state === "suspended") this.context.resume().catch(error => console.warn("Star Hop audio context could not resume.", error));
      }
      play(track) {
        if (!save.sound || !track.paused) return;
        track.play().catch(error => console.warn("Star Hop music could not play.", error));
      }
      setState(nextState, {restartGameplay=false,restartBoss=false}={}) {
        this.state = nextState;
        if (nextState === AUDIO_STATE.SILENT_MENU) {
          this.musicTrack.pause(); this.bossTrack.pause();
          this.musicTrack.currentTime = 0; this.bossTrack.currentTime = 0;
          return;
        }
        this.unlock();
        if (nextState === AUDIO_STATE.GAMEPLAY) {
          this.bossTrack.pause(); this.bossTrack.currentTime = 0;
          if (restartGameplay) this.musicTrack.currentTime = 0;
          this.play(this.musicTrack);
          return;
        }
        if (nextState === AUDIO_STATE.VICTORY) {
          this.musicTrack.pause(); this.bossTrack.pause(); this.bossTrack.currentTime=0;
          return;
        }
        this.musicTrack.pause();
        if (restartBoss) this.bossTrack.currentTime = 0;
        this.play(this.bossTrack);
      }
      tone(freq, duration = .12, type = "sine", volume = .12, delay = 0, glide = 0) {
        if (!save.sound) return;
        this.unlock();
        if (!this.context || !this.master) return;
        const t = this.context.currentTime + delay;
        const osc = this.context.createOscillator();
        const gain = this.context.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, t);
        if (glide) osc.frequency.exponentialRampToValueAtTime(Math.max(20, freq + glide), t + duration);
        gain.gain.setValueAtTime(.0001, t);
        gain.gain.exponentialRampToValueAtTime(volume, t + .012);
        gain.gain.exponentialRampToValueAtTime(.0001, t + duration);
        osc.connect(gain); gain.connect(this.master);
        osc.start(t); osc.stop(t + duration + .03);
      }
      event(name) {
        if (name === "press") this.tone(280, .05, "triangle", .08);
        if (name === "launch") { this.tone(160, .22, "sine", .14, 0, 220); this.tone(320, .12, "triangle", .06, .05, 160); }
        if (name === "star") { [660,880,1100].forEach((f,i) => this.tone(f,.12,"sine",.08,i*.045)); }
        if (name === "land") { [260,330,392].forEach((f,i) => this.tone(f,.2,"triangle",.08,i*.045)); }
        if (name === "perfect") { [392,523,659,784].forEach((f,i) => this.tone(f,.24,"triangle",.09,i*.05)); }
        if (name === "sun") { [330,495,660,990].forEach((f,i) => this.tone(f,.3,"sine",.075,i*.055)); }
        if (name === "proton") { this.tone(180,.34,"sine",.1,0,480); this.tone(720,.22,"triangle",.07,.13,-280); }
        if (name === "fail") { this.tone(220,.42,"sawtooth",.06,0,-130); this.tone(110,.5,"sine",.09,.12,-45); }
        if (name === "warning") { this.tone(155,.18,"square",.05); this.tone(155,.18,"square",.05,.25); }
        if (name === "bossHit") { this.tone(105,.32,"sawtooth",.08,0,210); this.tone(520,.16,"square",.06,.08,-190); }
        if (name === "victory") { [330,440,554,660,880].forEach((f,i)=>this.tone(f,.32,"triangle",.085,i*.07)); }
        if (name === "abduct") { this.tone(620,.5,"sine",.08,0,-480); this.tone(180,.4,"sawtooth",.05,.18,-90); }
      }
      setEnabled(enabled) {
        if (!enabled) {
          this.musicTrack.pause(); this.bossTrack.pause();
          if (this.master) this.master.gain.value = 0;
          return;
        }
        if (this.master) this.master.gain.value = .34;
        this.unlock();
        if (this.state === AUDIO_STATE.GAMEPLAY) this.play(this.musicTrack);
        if (this.state === AUDIO_STATE.BOSS) this.play(this.bossTrack);
      }
    }

    const audio = new AudioEngine();

    // DIFFICULTY DIRECTOR — ramps gently, plateaus, fluctuates, and inserts recovery stretches.
    class DifficultyDirector {
      constructor() { this.reset(); }
      reset() { this.recoveryLandings = 0; }
      afterBoss() { this.recoveryLandings = 3; }
      noteLanding() { if (this.recoveryLandings > 0) this.recoveryLandings--; }
      values(landings = run.planets) {
        const progress = clamp(landings / 22, 0, 1);
        const wave = Math.sin(landings * .73) * .5 + .5;
        const relief = this.recoveryLandings > 0 ? .72 : 1;
        return {
          orbitSpeed: (.66 + progress * .34 + (wave-.5)*.10) * relief,
          radius: clamp(68 - progress*17 + (wave-.5)*9 + (relief<1?8:0), 42, 76),
          gap: clamp(228 + progress*39 + wave*18 - (relief<1?18:0), 220, 292),
          satelliteChance: clamp((.13 + progress*.26 + wave*.05) * relief, .1, .42)
        };
      }
    }

    // CELESTIAL LANDMARK DIRECTOR — Sun → Red Giant → Alien Ship → transition → Boss.
    class CelestialLandmarkDirector {
      constructor() { this.reset(); }
      interval() { return LANDMARK_BASE_INTERVAL - 1 + Math.floor(rng()*3); }
      reset() { this.stage = 0; this.cycles = 0; this.nextIndex = Infinity; this.waitingForBoss = false; }
      beginRun() { this.stage = 0; this.cycles = 0; this.waitingForBoss = false; this.nextIndex = this.interval(); }
      kindForIndex(index) {
        if (index !== this.nextIndex) return "planet";
        if (this.stage === 0) { this.stage=1; this.nextIndex=index+this.interval(); return "sun"; }
        if (this.stage === 1) { this.stage=2; this.nextIndex=index+this.interval(); return "redGiant"; }
        if (this.stage === 2) { this.stage=3; this.nextIndex=index+1; return "alienShip"; }
        if (this.stage === 3) { this.stage=4; this.nextIndex=Infinity; this.waitingForBoss=true; return "bossTransition"; }
        return "planet";
      }
      afterBossVictory() {
        this.cycles++;
        this.stage=0;
        this.waitingForBoss=false;
        this.nextIndex=this.interval();
      }
    }

    const BOSS_STATE = Object.freeze({ OFF:"off", INTRO:"intro", ACTIVE:"active", HIT_TRANSITION:"hit-transition", VICTORY:"victory" });

    // BOSS ENCOUNTER STATE MACHINE — owns arena setup, attacks, recovery, victory and cleanup.
    class BossEncounterDirector {
      constructor() { this.reset(); }
      reset() {
        this.state=BOSS_STATE.OFF; this.timer=0; this.hits=0; this.maxHits=BOSS_BASE_HITS;
        this.x=0; this.y=0; this.width=0; this.flash=0; this.transitionKind="";
        this.grace=0; this.victoryAwarded=false; this.burstClock=0; this.starTimer=0;
        this.beam={phase:"idle",timer:0,target:-1,exposure:0,triggered:false};
        bossHealth?.classList.add("hidden");
      }
      get visible() { return this.state!==BOSS_STATE.OFF; }
      get arenaActive() { return [BOSS_STATE.ACTIVE,BOSS_STATE.HIT_TRANSITION,BOSS_STATE.VICTORY].includes(this.state); }
      get inputLocked() { return [BOSS_STATE.INTRO,BOSS_STATE.HIT_TRANSITION,BOSS_STATE.VICTORY].includes(this.state); }
      beginIntro(transitionPlanet) {
        if (this.state!==BOSS_STATE.OFF) return;
        this.state=BOSS_STATE.INTRO;
        this.timer=reducedMotion?.55:1.45;
        this.introDuration=this.timer;
        this.originY=transitionPlanet.y;
        this.x=W*.5; this.y=-H*.12; this.width=W*.58;
        charging=false; roo.state="cinematic"; landingPause=this.timer;
        audio.setState(AUDIO_STATE.BOSS,{restartBoss:true});

      setupArena() {
        this.state=BOSS_STATE.ACTIVE;

        const fluctuation=landmarkDirector.cycles>2&&landmarkDirector.cycles%3===0?-1:0;
        this.maxHits=clamp(BOSS_BASE_HITS+Math.min(2,landmarkDirector.cycles)+fluctuation,BOSS_BASE_HITS,BOSS_MAX_HITS);

          {index:2,kind:"asteroid",baseXPct:.75,baseYPct:.49,x:W*.75,y:H*.49,r:clamp(W*.135,43,55),phase:4.1,ampX:8,ampY:6,palette:["#655f78","#938ca5","#3c3852"],craters:makeCraters(mulberry32(run.seed^303),8)}
        ];
        collectibles=[]; satellites=[]; currentIndex=0; cameraY=0; cameraTargetY=0;

        Object.assign(roo,{state:"grounded",planet:0,angle:-Math.PI/2,orbitDir:1,orbitSpeed:.72,vx:0,vy:0,flightTime:0,rotation:0,grace:0});

        const now=performance.now()*.001;
        this.x=W*.5; this.y=H*.205; this.width=W*.58;
        planets.forEach(p=>{
          p.x=p.baseXPct*W+Math.sin(now*.55+p.phase)*p.ampX;
          p.y=p.baseYPct*H+Math.sin(now*.43+p.phase*1.7)*p.ampY;
        });
        collectibles.forEach(star=>{if(star.arena){star.x=star.xPct*W;star.y=star.yPct*H;}});
        this.grace=Math.max(0,this.grace-dt);
        if (collectibles.filter(s=>!s.taken).length<3) {
          this.starTimer=(this.starTimer??1)-dt;
          if (this.starTimer<=0) { this.spawnArenaStars(3); this.starTimer=2.8; }
        }
      }
      spawnArenaStars(count) {
        const spots=[[.38,.60],[.62,.60],[.5,.43],[.34,.37],[.66,.37],[.5,.31],[.18,.58],[.82,.58]];
        const occupied=collectibles.filter(s=>!s.taken).map(s=>s.spot);
        for (let i=0;i<count;i++) {
          const available=spots.map((_,n)=>n).filter(n=>!occupied.includes(n));
          if (!available.length) break;
          const spot=available[Math.floor(rng()*available.length)]; occupied.push(spot);
          collectibles.push({arena:true,spot,xPct:spots[spot][0],yPct:spots[spot][1],leg:-99,x:spots[spot][0]*W,y:spots[spot][1]*H,r:9,taken:false,phase:rng()*TAU});
        }
      }
      updateBeam(dt) {
        const beam=this.beam;
        if (this.grace>0) return;
        beam.timer-=dt;
        if (beam.phase==="idle"&&beam.timer<=0) {
          beam.phase="warning"; beam.timer=TRACTOR_BEAM_WARNING_MS/1000;
          beam.target=roo.state==="grounded"?roo.planet:currentIndex; beam.exposure=0; beam.triggered=false;
          audio.event("warning"); announce("Tractor beam locking on. Jump away.");
        } else if (beam.phase==="warning"&&beam.timer<=0) {
          beam.phase="active"; beam.timer=TRACTOR_BEAM_ACTIVE_MS/1000; beam.exposure=0;
        } else if (beam.phase==="active") {
          const target=planets[beam.target];
          const inside=target&&this.pointInsideBeam(roo.x,roo.y,target);
          beam.exposure=inside?beam.exposure+dt:Math.max(0,beam.exposure-dt*1.8);
          if (!beam.triggered&&beam.exposure>=TRACTOR_BEAM_ABDUCTION_MS/1000) { beam.triggered=true; this.abduct(); return; }
          if (beam.timer<=0) beam.phase="cooldown";
        } else if (beam.phase==="cooldown") {
          beam.exposure=Math.max(0,beam.exposure-dt*2);
          if (beam.timer<=-1.15) { beam.phase="idle"; beam.timer=2.6+rng()*1.7; beam.target=-1; beam.exposure=0; }
        }
      }
      pointInsideBeam(x,y,target) {
        const ax=this.x,ay=this.y+28,bx=target.x,by=target.y;
        const dx=bx-ax,dy=by-ay,len2=dx*dx+dy*dy||1;
        const t=clamp(((x-ax)*dx+(y-ay)*dy)/len2,0,1);
        const px=ax+dx*t,py=ay+dy*t;
        return Math.hypot(x-px,y-py)<28+34*t;
      }
      hitsBoss(x,y,margin=0) {
        const rx=this.width*.43+margin,ry=this.width*.22+margin;
        return ((x-this.x)/rx)**2+((y-this.y)/ry)**2<1;
      }
      stepFlight(dt) {
        roo.flightTime+=dt; roo.grace-=dt;
        const indexes=[0,1,2];
        const g=gravityAt(roo.x,roo.y,roo.vx,roo.vy,dt,indexes);
        roo.vx=g.vx; roo.vy=g.vy; roo.x+=roo.vx*dt; roo.y+=roo.vy*dt;
        roo.rotation=lerpAngle(roo.rotation,Math.atan2(roo.vy,roo.vx)+Math.PI/2,Math.min(1,dt*2.2));
        if (Math.random()<dt*18&&particles.length<MAX_EFFECT_PARTICLES) particles.push({x:roo.x-roo.vx*.05,y:roo.y-roo.vy*.05,vx:-roo.vx*.04+(Math.random()-.5)*16,vy:-roo.vy*.04+(Math.random()-.5)*16,life:.38,max:.38,size:2+Math.random()*2,color:currentSuit().color});
        collectibles.forEach(star=>{if(!star.taken&&Math.hypot(roo.x-star.x,roo.y-star.y)<star.r+18)collectStar(star);});
        if (this.state===BOSS_STATE.ACTIVE&&roo.grace<=0&&this.hitsBoss(roo.x,roo.y,12)) { this.hitBoss(); return; }
        for (const p of planets) {
          if (p.index!==roo.planet&&Math.hypot(roo.x-p.x,roo.y-p.y)<p.r+7) { this.landOnAsteroid(p.index); return; }
        }
        const home=planets[roo.planet];
        if (home&&roo.grace<=0&&Math.hypot(roo.x-home.x,roo.y-home.y)<home.r+5) { landBack(); return; }
        if (roo.flightTime>6.6||roo.x<-W*.4||roo.x>W*1.4||roo.y>H*1.18||roo.y<-H*.2) finishRun("Lost beyond the asteroid belt.");
      }
      landOnAsteroid(index) {
        const p=planets[index];
        const speed=Math.hypot(roo.vx,roo.vy),nx=(roo.x-p.x)/(p.r+7),ny=(roo.y-p.y)/(p.r+7);
        const perfect=Math.abs(-ny*roo.vx+nx*roo.vy)<155&&speed<470;
        Object.assign(roo,{state:"grounded",planet:index,angle:Math.atan2(roo.y-p.y,roo.x-p.x),vx:0,vy:0});
        currentIndex=index; run.combo=perfect?run.combo+1:0; run.bestCombo=Math.max(run.bestCombo,run.combo); if(perfect)run.perfects++;
        run.score+=80+(perfect?50+Math.min(100,run.combo*10):0); save.landings++;
        roo.orbitDir=index===1?1:index===2?-1:(this.x>=p.x?1:-1); roo.orbitSpeed=.72;
        setGroundedPosition(); run.checkpoint={index,angle:roo.angle,boss:true}; landingPause=.3; charge=.12; updateScore();
        const label=perfect?(run.combo>1?`PERFECT ×${run.combo}`:"PERFECT!"):"ASTEROID";
        floater(label,roo.x,roo.y-36,perfect?COLORS.gold:COLORS.cream); audio.event(perfect?"perfect":"land"); vibrate(perfect?[8,24,10]:14);
      }
      hitBoss() {
        if (this.state!==BOSS_STATE.ACTIVE) return;
        this.state=BOSS_STATE.HIT_TRANSITION; this.transitionKind="hit"; this.timer=reducedMotion?.35:.68;
        roo.state="cinematic"; charging=false;
        this.hits++; this.flash=.45; this.beam={phase:"idle",timer:99,target:-1,exposure:0,triggered:true};
        run.score+=BOSS_HIT_SCORE_BONUS; this.awardProtons(2); updateScore(); this.updateHealthHUD();
        burst(this.x,this.y,reducedMotion?8:28,COLORS.cyan,220); floater(`DIRECT HIT +${BOSS_HIT_SCORE_BONUS}`,this.x,this.y+66,COLORS.gold);
        audio.event("bossHit"); vibrate([18,25,28]); announce(`Direct hit. ${this.maxHits-this.hits} hits remain.`);
      }
      awardProtons(amount) {
        const room=MAX_PROTONS-run.protons,added=Math.min(room,amount),overflow=amount-added;
        run.protons+=added; updateProtonHUD();
        if (overflow>0) { const bonus=overflow*BOSS_PROTON_OVERFLOW_BONUS; run.score+=bonus; showToast(`PROTON OVERFLOW +${bonus}`); }
        else showToast(`PROTON +${added}`);
      }
      abduct() {
        charging=false; audio.event("abduct"); vibrate([22,30,22]);
        if (run.protons>0) {
          run.protons--; updateProtonHUD(); this.state=BOSS_STATE.HIT_TRANSITION; this.transitionKind="abduct"; this.timer=reducedMotion?.4:.8;
          this.beam={phase:"idle",timer:99,target:-1,exposure:0,triggered:true}; roo.state="lost";
          showToast("PROTON BROKE THE BEAM"); announce("One Proton lost. Returning to the lower asteroid.");
        } else {
          this.beam={phase:"idle",timer:99,target:-1,exposure:0,triggered:true};
          finishRun("The tractor beam got its roo.",{bypassProton:true});
        }
      }
      warpToLower() {
        const p=planets[0]; if(!p)return;
        currentIndex=0; Object.assign(roo,{state:"grounded",planet:0,angle:-Math.PI/2,orbitDir:1,orbitSpeed:.72,vx:0,vy:0,flightTime:0,rotation:0,grace:0});
        setGroundedPosition(); run.checkpoint={index:0,angle:roo.angle,boss:true}; charge=.12; charging=false; landingPause=.55;
        burst(roo.x,roo.y,reducedMotion?7:20,"#a994ff",155); floater(this.transitionKind==="abduct"?"BEAM ESCAPED":"WARP RETURN",roo.x,roo.y-40,"#c8c1ff");
      }
      beginVictory() {
        this.state=BOSS_STATE.VICTORY; this.timer=reducedMotion?1.15:2.35; this.burstClock=0; this.beam={phase:"idle",timer:99,target:-1,exposure:0,triggered:true};
        audio.setState(AUDIO_STATE.VICTORY); audio.event("victory"); bossHealth.classList.add("hidden");
        showToast("ALIEN COMMAND DEFEATED!"); announce("Alien command defeated. Victory reward incoming.");
      }
      completeVictory() {
        if (this.victoryAwarded) return; this.victoryAwarded=true;
        run.score+=BOSS_VICTORY_SCORE_BONUS; run.protons=MAX_PROTONS; updateScore(); updateProtonHUD();
        showToast(`VICTORY +${BOSS_VICTORY_SCORE_BONUS} · PROTONS FULL`);
        landmarkDirector.afterBossVictory(); difficultyDirector.afterBoss();
        audio.setState(AUDIO_STATE.GAMEPLAY);
        this.restoreNormalWorld();
      }
      restoreNormalWorld() {
        this.state=BOSS_STATE.OFF; bossHealth.classList.add("hidden");
        planets=[]; collectibles=[]; satellites=[]; particles=[]; floaters=[]; currentIndex=0;
        planets.push(createPlanet(0,null)); ensurePlanets();
        const p=planets[0]; Object.assign(roo,{state:"grounded",planet:0,angle:-Math.PI/2,orbitDir:planets[1]?.x>=p.x?1:-1,orbitSpeed:.66,vx:0,vy:0,flightTime:0,rotation:0,grace:0});
        setGroundedPosition(); run.checkpoint={index:0,angle:roo.angle}; cameraY=p.y-H*.72; cameraTargetY=cameraY;
        charge=.12; chargeDirection=1; charging=false; landingPause=.65;
        burst(roo.x,roo.y,reducedMotion?6:18,COLORS.gold,140);
      }
      updateHealthHUD() {
        const remaining=Math.max(0,this.maxHits-this.hits),ratio=this.maxHits?remaining/this.maxHits:0;
        bossHealthFill.style.width=`${ratio*100}%`;
        bossHealth.setAttribute("aria-label",`Alien boss: ${remaining} of ${this.maxHits} hits remaining`);
      }
      cleanupForRunEnd() {
        this.beam={phase:"idle",timer:99,target:-1,exposure:0,triggered:true};
        if(this.visible){this.state=BOSS_STATE.HIT_TRANSITION;this.timer=999;this.transitionKind="run-end";}
        bossHealth.classList.add("hidden");
      }
    }

    const difficultyDirector=new DifficultyDirector();
    const landmarkDirector=new CelestialLandmarkDirector();
    const bossDirector=new BossEncounterDirector();

    function freshRun() {
      return {
        score: 0, stars: 0, planets: 0, perfects: 0, combo: 0, bestCombo: 0, jumps: 0,
        protons: 0, checkpoint: null, recovering: false,
        seed: 0, ended: false, started: false, submitted: false, attemptToken: attemptToken(),
        result: null, syncState: "pending", syncMessage: ""
      };
    }

    // RUN RESULT NORMALISATION AND SCORE SUBMISSION
    const completedAttemptTokens = new Set();
    const knownBestScores = new Map();

    function activeRunName() {
      return mode === "party" ? identities.partyNames[party.current] : identities.singleName;
    }

    function normaliseRunResult(sourceRun = run) {
      return {
        name: activeRunName(),
        score: sourceRun.score,
        starsCollected: sourceRun.stars,
        bestCombo: sourceRun.bestCombo,
        perfects: sourceRun.perfects,
        planets: sourceRun.planets,
        mode: mode === "party" ? "party" : "single",
        playerCount: mode === "party" ? party.players : 1
      };
    }

    function sortScoreEntries(entries) {
      return [...entries].sort((a,b) => Number(b.score||0)-Number(a.score||0) || new Date(a.createdAt||0)-new Date(b.createdAt||0));
    }

    // DEMO LEADERBOARD RECORDS — used only while LEADERBOARD_API_URL is empty.
    const DEMO_LEADERBOARD_RECORDS = [
      {id:"demo-001",name:"MOONROO",score:420,starsCollected:3,bestCombo:2,perfects:1,planets:3,mode:"single",playerCount:1,createdAt:"2026-07-16T03:25:00.000Z",source:"demo"},
      {id:"demo-002",name:"HOPBOT",score:285,starsCollected:2,bestCombo:1,perfects:0,planets:2,mode:"party",playerCount:3,createdAt:"2026-07-17T11:14:00.000Z",source:"demo"},
      {id:"demo-003",name:"SUNBUN",score:160,starsCollected:1,bestCombo:1,perfects:0,planets:1,mode:"single",playerCount:1,createdAt:"2026-07-18T08:42:00.000Z",source:"demo"}
    ];

    let demoSessionRecords = [];
    let leaderboardCache = null;

    function normaliseLeaderboardEntry(entry) {
      return {
        id: entry.id ?? `entry-${Math.random().toString(36).slice(2)}`,
        name: normaliseName(entry.name || "ROO"),
        score: Number(entry.score) || 0,
        starsCollected: Number(entry.starsCollected ?? entry.stars) || 0,
        bestCombo: Number(entry.bestCombo) || 0,
        perfects: Number(entry.perfects) || 0,
        planets: Number(entry.planets) || 0,
        mode: entry.mode === "party" ? "party" : "single",
        playerCount: Number(entry.playerCount) || 1,
        createdAt: entry.createdAt || new Date().toISOString(),
        source: ["demo","session","remote"].includes(entry.source) ? entry.source : (entry.demo?"demo":entry.synced===false?"session":"remote")
      };
    }

    // LEADERBOARD API ADAPTER — all network communication stays inside this object.
    const leaderboardAPI = {
      async loadLeaderboard(force = false) {
        if (!force && leaderboardCache) return leaderboardCache;
        if (!LEADERBOARD_API_URL) {
          const seeded=SHOW_DEMO_RECORDS?DEMO_LEADERBOARD_RECORDS:[];
          leaderboardCache = {entries:sortScoreEntries([...demoSessionRecords,...seeded]).slice(0,10),totalAttempts:null,demo:SHOW_DEMO_RECORDS};
          return leaderboardCache;
        }
        const response = await fetch(`${LEADERBOARD_API_URL.replace(/\/$/,"")}/leaderboard`, {headers:{Accept:"application/json"}});
        if (!response.ok) throw new Error(`Leaderboard request failed (${response.status})`);
        const data = await response.json();
        const entries = Array.isArray(data) ? data : (data.entries || data.leaderboard || data.scores || []);
        leaderboardCache = {entries:sortScoreEntries(entries.map(normaliseLeaderboardEntry)).slice(0,10),totalAttempts:Number(data.totalAttempts ?? data.totalCompletedAttempts) || 0,demo:false};
        return leaderboardCache;
      },

      async submitScore(scoreData) {
        if (!LEADERBOARD_API_URL) {
          const entry = normaliseLeaderboardEntry({...scoreData,id:`session-${Date.now()}-${Math.random().toString(36).slice(2)}`,createdAt:new Date().toISOString(),source:"session"});
          demoSessionRecords.push(entry);
          leaderboardCache = null;
          return {accepted:false,offline:true,entry,bestForName:entry.score,madeTopTen:false};
        }
        const response = await fetch(`${LEADERBOARD_API_URL.replace(/\/$/,"")}/scores`, {
          method:"POST", headers:{"Content-Type":"application/json",Accept:"application/json"}, body:JSON.stringify(scoreData)
        });
        if (!response.ok) throw new Error(`Score submission failed (${response.status})`);
        const data = await response.json();
        leaderboardCache = null;
        return data;
      },

      async lookupPlayer(name) {
        const valid = validateName(name);
        if (!valid.valid) throw new Error(valid.message);
        if (!LEADERBOARD_API_URL) {
          const seeded=SHOW_DEMO_RECORDS?DEMO_LEADERBOARD_RECORDS:[];
          return {entries:sortScoreEntries([...demoSessionRecords,...seeded].filter(entry=>normaliseName(entry.name)===valid.name)).slice(0,10),demo:SHOW_DEMO_RECORDS};
        }
        const response = await fetch(`${LEADERBOARD_API_URL.replace(/\/$/,"")}/player?name=${encodeURIComponent(valid.name)}`, {headers:{Accept:"application/json"}});
        if (!response.ok) throw new Error(`Player lookup failed (${response.status})`);
        const data = await response.json();
        const entries = Array.isArray(data) ? data : (data.entries || data.scores || []);
        return {entries:sortScoreEntries(entries.map(normaliseLeaderboardEntry)).slice(0,10),demo:false};
      }
    };

    function recordCompletedAttempt() {
      if (!run.started || run.submitted || completedAttemptTokens.has(run.attemptToken)) return;
      const completedRun = run;
      const validName = validateName(activeRunName());
      if (!validName.valid) { completedRun.syncState="failed"; completedRun.syncMessage="Name required before score sync."; return; }
      completedRun.submitted = true;
      completedAttemptTokens.add(completedRun.attemptToken);
      completedRun.result = normaliseRunResult(completedRun);
      knownBestScores.set(validName.name, Math.max(knownBestScores.get(validName.name)||0, completedRun.score));
      leaderboardAPI.submitScore(completedRun.result).then(result => {
        completedRun.syncState = result.offline ? "offline" : "synced";
        if (Number(result.bestForName)) knownBestScores.set(validName.name, Math.max(knownBestScores.get(validName.name)||0, Number(result.bestForName)));
        if (result.madeTopTen) showToast("TOP TEN!");
      }).catch(error => {
        completedRun.syncState = "failed";
        completedRun.syncMessage = "SCORE COULD NOT SYNC";
        console.warn("Star Hop score could not sync.", error);
        if (["gameover","partypass","partyresults"].includes(scene)) showToast(completedRun.syncMessage);
      });
    }

    function resize() {
      const rect = stage.getBoundingClientRect();
      previousW = W;
      W = Math.max(280, Math.round(rect.width));
      H = Math.max(480, Math.round(rect.height));
      DPR = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.round(W * DPR);
      canvas.height = Math.round(H * DPR);
      canvas.style.width = `${W}px`;
      canvas.style.height = `${H}px`;
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

      if (previousW && previousW !== W && planets.length) {
        const s = W / previousW;
        planets.forEach(p => p.x *= s);
        collectibles.forEach(o => o.x *= s);
        roo.x *= s;
      }
      makeSky();
      demoPlanet = makeDemoPlanet();
      if (bossDirector.visible) { bossDirector.x=W*.5; bossDirector.width=W*.58; if(bossDirector.arenaActive){cameraY=0;cameraTargetY=0;} }
      else if (planets.length) cameraTargetY = planets[currentIndex].y - H * .72;
    }

    function makeSky() {
      const rand = mulberry32(739391 + W * 7 + H * 13);
      skyStars = Array.from({ length: Math.floor(W * H / 5000) }, (_, i) => ({
        x: rand() * W, y: rand() * H, r: .45 + rand() * 1.55,
        a: .2 + rand() * .75, phase: rand() * TAU, speed: .35 + rand() * 1.2,
        layer: rand() < .18 ? 1 : .45
      }));
    }

    function makeDemoPlanet() {
      const r = clamp(W * .19, 58, 88);
      return {
        x: W * .52, y: H * .49, r, palette: ["#e37752", "#ffb56b", "#9e3f43"],
        ring: true, phase: 1.2, craters: makeCraters(mulberry32(4819), 9)
      };
    }

    function makeCraters(rand, count) {
      return Array.from({ length: count }, () => ({
        a: rand() * TAU, d: .12 + rand() * .66, r: .045 + rand() * .105, squish: .65 + rand() * .35
      }));
    }

    function planetPalette(index) {
      const palettes = [
        ["#e36f4f", "#ffb56b", "#9e3f43"], ["#5f8892", "#8fc6a5", "#355366"],
        ["#766aa8", "#b19bd0", "#443b79"], ["#d99b4e", "#ffd36a", "#9b573f"],
        ["#507f9d", "#71d6d1", "#30476d"], ["#a75570", "#f28ca5", "#633557"]
      ];
      return palettes[index % palettes.length];
    }

    function createPlanet(index, previous) {
      if (!previous) {
        const rand = mulberry32(run.seed ^ 0xa391);
        return { index, kind:"planet", x: W * .5, y: 0, r: clamp(W * .18, 58, 74), palette: planetPalette(0), ring: false, phase: rand()*TAU, craters: makeCraters(rand, 9) };
      }
      const difficulty=difficultyDirector.values();
      const rand = mulberry32((run.seed + index * 15485863) >>> 0);
      const kind=landmarkDirector.kindForIndex(index);
      let r=clamp(difficulty.radius+(rng()-.5)*12,40,78);
      if(kind==="sun")r=clamp(W*.255,86,108);
      if(kind==="redGiant")r=clamp(W*.39,122,158);
      if(kind==="alienShip")r=clamp(W*.30,100,126);
      if(kind==="bossTransition")r=clamp(W*.125,42,52);
      let x;
      if(kind==="redGiant") x=W*(.46+rng()*.08);
      else if(kind==="alienShip") x=W*(.47+rng()*.06);
      else {
        const margin=Math.min(W*.42,r+24);
        x=margin+rng()*Math.max(20,W-margin*2);
        if(Math.abs(x-previous.x)<42)x=clamp(x+(rng()<.5?-1:1)*(72+rng()*48),margin,W-margin);
      }
      const gap=Math.max(difficulty.gap+rng()*34,previous.r+r+58);
      const isSun=kind==="sun";
      return {
        index,kind,x,y:previous.y-gap,r,isSun,
        palette:isSun?["#f5a338","#fff0a2","#d94d3f"]:kind==="redGiant"?["#a93232","#ff7147","#5d1d2a"]:kind==="alienShip"?["#4d6477","#91aab4","#27313e"]:planetPalette(index),
        ring:kind==="planet"&&index>1&&rand()<.28,phase:rand()*TAU,
        craters:["sun","alienShip"].includes(kind)?[]:makeCraters(rand,kind==="redGiant"?16:7+Math.floor(rand()*5))
      };
    }

    function ensurePlanets(countAhead = 5) {
      while (planets.length <= currentIndex + countAhead) {
        const p = createPlanet(planets.length, planets[planets.length - 1]);
        planets.push(p);
        if (p.index > 0) spawnLeg(p.index - 1, p.index);
        if (p.kind==="bossTransition") break;
      }
    }

    function spawnLeg(fromIndex, toIndex) {
      const a = planets[fromIndex], b = planets[toIndex];
      const starCount = rng() < .35 ? 3 : 2;
      for (let i = 0; i < starCount; i++) {
        const t = .28 + i * (.43 / Math.max(1, starCount - 1));
        collectibles.push({
          leg: fromIndex, x: lerp(a.x,b.x,t) + (rng()-.5)*58,
          y: lerp(a.y,b.y,t) - 35 - rng()*36, r: 10, taken: false, phase: rng()*TAU
        });
      }
      const difficulty=difficultyDirector.values();
      if (toIndex > 3 && !["redGiant","alienShip","bossTransition"].includes(b.kind) && rng() < difficulty.satelliteChance) {
        const alienChance=landmarkDirector.stage>=2||landmarkDirector.cycles>0?.32:.06;
        satellites.push({ leg: fromIndex, planet: toIndex, angle: rng()*TAU, speed: (rng()<.5?-1:1)*(.38+rng()*.28), radius: b.r+47+rng()*28, x:0, y:0, size: 13, alien:rng()<alienChance,variant:Math.floor(rng()*3) });
      }
    }

    function resetRun(chosenMode = mode) {
      mode = chosenMode;
      run = freshRun();
      const key = dateKey();
      run.seed = mode === "party" ? hashString(`party-${key}`) : (Date.now() ^ (Math.random()*0xffffffff)) >>> 0;
      rng = mulberry32(run.seed);
      difficultyDirector.reset();
      landmarkDirector.beginRun();
      bossDirector.reset();
      planets = [];
      collectibles = [];
      satellites = [];
      particles = [];
      floaters = [];
      currentIndex = 0;
      charge = .12;
      chargeDirection = 1;
      charging = false;
      landingPause = 0;
      planets.push(createPlanet(0, null));
      ensurePlanets();
      const p = planets[0];
      Object.assign(roo, { state:"grounded", planet:0, angle:-Math.PI/2, orbitDir: planets[1].x >= p.x ? 1 : -1, orbitSpeed:.66, vx:0, vy:0, flightTime:0, rotation:0, grace:0 });
      setGroundedPosition();
      run.checkpoint = {index:0,angle:roo.angle};
      cameraY = p.y - H*.72;
      cameraTargetY = cameraY;
      updateScore();
      updateProtonHUD();
    }

    function setGroundedPosition() {
      const p = planets[roo.planet];
      if (!p) return;
      const offset = p.r + 3;
      roo.x = p.x + Math.cos(roo.angle) * offset;
      roo.y = p.y + Math.sin(roo.angle) * offset;
      roo.rotation = roo.angle + Math.PI/2;
    }

    function gravityAt(x, y, vx, vy, dt, indexes) {
      let ax = 0, ay = 0;
      indexes.forEach(i => {
        const p = planets[i];
        if (!p) return;
        const dx = p.x-x, dy = p.y-y;
        const d2 = Math.max((p.r*.78)**2, dx*dx+dy*dy);
        const d = Math.sqrt(d2);
        const strength = 115 * p.r*p.r / d2;
        ax += dx/d*strength;
        ay += dy/d*strength;
      });
      return { vx: vx + ax*dt, vy: vy + ay*dt };
    }

    function launchVelocity(power = charge) {
      const normal = { x: Math.cos(roo.angle), y: Math.sin(roo.angle) };
      const tangent = { x: -Math.sin(roo.angle)*roo.orbitDir, y: Math.cos(roo.angle)*roo.orbitDir };
      const dx = tangent.x*.79 + normal.x*.61;
      const dy = tangent.y*.79 + normal.y*.61;
      const n = Math.hypot(dx,dy) || 1;
      const speed = 235 + power*285;
      return { x: dx/n*speed, y: dy/n*speed };
    }

    function predictedPath() {
      if (!charging || roo.state !== "grounded") return [];
      const path = [];
      let x = roo.x, y = roo.y;
      const launch = launchVelocity();
      let vx = launch.x, vy = launch.y;
      predictedHit = false;
      const target = bossDirector.arenaActive ? null : planets[currentIndex+1];
      for (let i=0; i<43; i++) {
        const gravityIndexes=bossDirector.arenaActive?[0,1,2]:[currentIndex,currentIndex+1,currentIndex+2];
        const g = gravityAt(x,y,vx,vy,.045,gravityIndexes);
        vx=g.vx; vy=g.vy; x+=vx*.045; y+=vy*.045;
        if (i%2===0) path.push({x,y});
        if (bossDirector.arenaActive) {
          if (planets.some(p=>p.index!==roo.planet&&Math.hypot(x-p.x,y-p.y)<p.r+8)||bossDirector.hitsBoss(x,y,8)) { predictedHit=true; break; }
        } else if (target && Math.hypot(x-target.x,y-target.y) < target.r+8) { predictedHit = true; break; }
      }
      return path;
    }

    function beginCharge() {
      if (scene !== "playing" || roo.state !== "grounded" || landingPause > 0 || charging || bossDirector.inputLocked) return;
      audio.unlock();
      audio.event("press");
      charging = true;
      charge = Math.max(charge,.12);
      chargeDirection = 1;
      launchLabel.textContent = "Release to leap";
      tip.classList.add("hidden");
      vibrate(7);
    }

    function releaseCharge() {
      if (!charging || roo.state !== "grounded" || scene !== "playing" || bossDirector.inputLocked) return;
      charging = false;
      const v = launchVelocity();
      roo.state = "flying";
      roo.vx = v.x; roo.vy = v.y;
      roo.flightTime = 0; roo.grace = .3;
      save.jumps++;
      run.jumps++;
      run.started=true;
      launchLabel.textContent = "Hold to launch";
      powerReadout.textContent = "Airborne";
      audio.event("launch");
      vibrate(12);
      burst(roo.x,roo.y,7,currentSuit().color,95);
      announce("Launch!");
      if (!save.tutorialSeen) { save.tutorialSeen = true; persist(); }
    }

    function currentSuit() { return SUITS.find(s=>s.id===save.suit) || SUITS[0]; }

    function stepPlaying(dt) {
      landingPause = Math.max(0, landingPause-dt);
      bossDirector.update(dt);
      if (bossDirector.state===BOSS_STATE.INTRO) { updateParticles(dt); return; }
      satellites.forEach(s => {
        const p = planets[s.planet];
        if (!p) return;
        s.angle += s.speed*dt;
        s.x=p.x+Math.cos(s.angle)*s.radius;
        s.y=p.y+Math.sin(s.angle)*s.radius*.72;
      });

      if (roo.state === "grounded") {
        if (!charging && landingPause <= 0) {
          roo.angle += roo.orbitDir * roo.orbitSpeed * dt;
          setGroundedPosition();
        }
        if (charging) {
          charge += chargeDirection * dt * .84;
          if (charge >= 1) { charge=1; chargeDirection=-1; vibrate(5); }
          if (charge <= .12) { charge=.12; chargeDirection=1; }
          powerReadout.textContent = predictedHit ? "Landing lined up" : `${Math.round(charge*100)}% power`;
        } else if (landingPause <= 0) {
          powerReadout.textContent = "Ready";
        }
      } else if (roo.state === "flying") {
        stepFlight(dt);
      }

      if (bossDirector.arenaActive) {
        cameraY=0; cameraTargetY=0;
      } else {
        const baseCamera = planets[currentIndex].y - H*.72;
        cameraTargetY = roo.state === "flying" ? Math.min(baseCamera, roo.y-H*.46) : baseCamera;
        cameraY = lerp(cameraY,cameraTargetY,1-Math.pow(.0006,dt));
      }
      powerFill.style.width = `${Math.round(charge*100)}%`;
      updateParticles(dt);
    }

    function stepFlight(dt) {
      if (bossDirector.arenaActive) { bossDirector.stepFlight(dt); return; }
      roo.flightTime += dt;
      roo.grace -= dt;
      const g = gravityAt(roo.x,roo.y,roo.vx,roo.vy,dt,[currentIndex,currentIndex+1,currentIndex+2]);
      roo.vx=g.vx; roo.vy=g.vy;
      roo.x += roo.vx*dt; roo.y += roo.vy*dt;
      roo.rotation = lerpAngle(roo.rotation, Math.atan2(roo.vy,roo.vx)+Math.PI/2, Math.min(1,dt*2.2));

      if (Math.random() < dt*18) particles.push({x:roo.x-roo.vx*.05,y:roo.y-roo.vy*.05,vx:-roo.vx*.04+(Math.random()-.5)*16,vy:-roo.vy*.04+(Math.random()-.5)*16,life:.38,max:.38,size:2+Math.random()*2,color:currentSuit().color});

      collectibles.forEach(star => {
        if (!star.taken && star.leg >= currentIndex-1 && Math.hypot(roo.x-star.x,roo.y-star.y)<star.r+18) collectStar(star);
      });

      for (const sat of satellites) {
        if (sat.leg === currentIndex && Math.hypot(roo.x-sat.x,roo.y-sat.y)<sat.size+17) {
          finishRun("Satellite disagreed.");
          return;
        }
      }

      const target = planets[currentIndex+1];
      if (target && Math.hypot(roo.x-target.x,roo.y-target.y) < target.r+7) {
        landOn(currentIndex+1);
        return;
      }

      const home = planets[currentIndex];
      if (roo.grace <= 0 && Math.hypot(roo.x-home.x,roo.y-home.y)<home.r+5) {
        landBack();
        return;
      }

      if (roo.flightTime > 6.3 || roo.x < -W*.45 || roo.x > W*1.45 || roo.y > home.y+H*.48 || (target && roo.y < target.y-H*.5)) {
        finishRun(roo.y > home.y ? "Gravity wins again." : "Space is mostly space.");
      }
    }

    function collectStar(star) {
      star.taken = true;
      run.stars++;
      run.score += 25 * Math.max(1,run.combo);
      updateScore();
      burst(star.x,star.y,12,COLORS.gold,135);
      floater("+STAR",star.x,star.y,COLORS.gold);
      audio.event("star"); vibrate([5,20,5]);
    }

    function landOn(index) {
      const p = planets[index];
      const speed = Math.hypot(roo.vx,roo.vy);
      const nx=(roo.x-p.x)/(p.r+7), ny=(roo.y-p.y)/(p.r+7);
      const tangentSpeed=Math.abs(-ny*roo.vx+nx*roo.vy);
      const perfect = tangentSpeed < 155 && speed < 470;
      roo.state="grounded"; roo.planet=index; roo.angle=Math.atan2(roo.y-p.y,roo.x-p.x);
      currentIndex=index;
      run.planets++;
      run.combo = perfect ? run.combo+1 : 0;
      run.bestCombo=Math.max(run.bestCombo,run.combo);
      if (perfect) run.perfects++;
      const landingPoints=100+(perfect?50:0)+(perfect?Math.min(100,run.combo*10):0);
      run.score+=landingPoints;
      save.landings++;
      difficultyDirector.noteLanding();
      ensurePlanets();
      const next=planets[index+1];
      roo.orbitDir=next?next.x>=p.x?1:-1:1;
      roo.orbitSpeed=difficultyDirector.values().orbitSpeed;
      roo.vx=0; roo.vy=0;
      setGroundedPosition();
      run.checkpoint={index,angle:roo.angle};
      landingPause=.35;
      charge=.12;
      updateScore();
      const label=perfect?(run.combo>1?`PERFECT ×${run.combo}`:"PERFECT!"):"LANDED";
      floater(label,roo.x,roo.y-38,perfect?COLORS.gold:COLORS.cream);
      burst(roo.x,roo.y,perfect?20:11,perfect?COLORS.gold:COLORS.apricot,perfect?175:110);
      audio.event(perfect?"perfect":"land");
      if (p.isSun) rewardSun(p);
      if (p.kind==="bossTransition") bossDirector.beginIntro(p);
      vibrate(perfect?[8,28,8,28,12]:16);
      announce(`${label}. ${run.score} points.`);
    }

    // SUN REWARDS AND PROTON INVENTORY
    function rewardSun(sun) {
      if (run.protons < MAX_PROTONS) {
        run.protons++;
        updateProtonHUD();
        floater("PROTON +1",sun.x,sun.y-52,"#b7a8ff");
        burst(sun.x,sun.y,18,"#a994ff",145);
        showToast("PROTON +1");
      } else {
        run.score += FULL_PROTON_SCORE_BONUS;
        updateScore();
        floater(`PROTON SURGE +${FULL_PROTON_SCORE_BONUS}`,sun.x,sun.y-52,COLORS.gold);
        burst(sun.x,sun.y,22,COLORS.gold,170);
        showToast(`PROTON SURGE! +${FULL_PROTON_SCORE_BONUS}`);
      }
      audio.event("sun");
      vibrate([8,22,8,22,14]);
    }

    function landBack() {
      const p=planets[currentIndex];
      roo.state="grounded"; roo.angle=Math.atan2(roo.y-p.y,roo.x-p.x); roo.vx=roo.vy=0;
      setGroundedPosition(); landingPause=.2; run.combo=0; charge=.12;
      floater("BACK AGAIN",roo.x,roo.y-34,COLORS.lavender);
      audio.event("land"); vibrate(12);
    }

    function finishRun(reason,{bypassProton=false}={}) {
      if (run.ended || run.recovering) return;
      charging=false; roo.state="lost";
      audio.event("fail"); vibrate([30,45,30]);
      if (run.protons > 0 && !bypassProton) {
        run.recovering=true;
        run.protons--;
        if(bossDirector.arenaActive)bossDirector.beam={phase:"idle",timer:99,target:-1,exposure:0,triggered:true};
        updateProtonHUD();
        const token=run.attemptToken;
        announce("A Proton is bringing you home.");
        setTimeout(()=>recoverWithProton(token),650);
        return;
      }
      run.ended=true;
      if (bossDirector.visible) { bossDirector.cleanupForRunEnd(); audio.setState(AUDIO_STATE.GAMEPLAY); }
      save.runs++;
      save.totalStars+=run.stars;
      const isBest=run.score>save.best;
      run.endReason=reason;
      run.isBest=isBest;
      save.best=Math.max(save.best,run.score);
      persist();
      recordCompletedAttempt();
      announce(`${reason} Final score ${run.score}.`);
      const finishedToken=run.attemptToken;
      setTimeout(()=>{
        if(run.attemptToken!==finishedToken||scene==="menu")return;
        if (mode==="party") partyRoundOver(reason);
        else showGameOver(reason,isBest);
      }, 650);
    }

    // PROTON RECOVERY — restore only the last confirmed successful landing.
    function recoverWithProton(token) {
      if (run.attemptToken!==token || run.ended || !run.recovering || !["playing","paused"].includes(scene)) return;
      const checkpoint=run.checkpoint || {index:currentIndex,angle:-Math.PI/2};
      const planet=planets[checkpoint.index];
      if (!planet) {
        run.recovering=false;
        run.protons=0;
        finishRun("The Proton lost the signal.");
        return;
      }
      currentIndex=checkpoint.index;
      Object.assign(roo,{state:"grounded",planet:checkpoint.index,angle:checkpoint.angle,vx:0,vy:0,flightTime:0,rotation:checkpoint.angle+Math.PI/2,grace:0});
      setGroundedPosition();
      roo.orbitDir=planets[currentIndex+1]?.x>=planet.x?1:-1;
      roo.orbitSpeed=run.checkpoint?.boss?.72:difficultyDirector.values().orbitSpeed;
      charge=.12; chargeDirection=1; charging=false; landingPause=.55;
      cameraY=run.checkpoint?.boss?0:planet.y-H*.72; cameraTargetY=cameraY;
      run.recovering=false;
      run.combo=0;
      if(run.checkpoint?.boss){bossDirector.beam={phase:"idle",timer:2.7,target:-1,exposure:0,triggered:false};bossDirector.grace=BOSS_GRACE_MS/1000;}
      burst(roo.x,roo.y,24,"#a994ff",160);
      floater("PROTON SAVED YOU",roo.x,roo.y-42,"#c8c1ff");
      showToast("PROTON SAVED YOU");
      audio.event("proton"); vibrate([10,28,10]);
      updateProtonHUD();
      announce("Proton saved you. Ready to launch.");
    }

    function burst(x,y,count,color,speed=120) {
      if (reducedMotion) count=Math.min(count,5);
      count=Math.min(count,Math.max(0,MAX_EFFECT_PARTICLES-particles.length));
      for (let i=0;i<count;i++) {
        const a=Math.random()*TAU, s=speed*(.3+Math.random()*.7);
        particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:.45+Math.random()*.45,max:.9,size:1.5+Math.random()*3,color});
      }
    }

    function floater(text,x,y,color) { floaters.push({text,x,y,color,life:1.05,max:1.05}); }

    function updateParticles(dt) {
      particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=Math.pow(.2,dt);p.vy*=Math.pow(.2,dt);p.life-=dt;});
      particles=particles.filter(p=>p.life>0);
      floaters.forEach(f=>{f.y-=28*dt;f.life-=dt;});
      floaters=floaters.filter(f=>f.life>0);
    }

    function lerpAngle(a,b,t) {
      let d=(b-a+Math.PI)%TAU-Math.PI;
      return a+d*t;
    }

    function updateScore() { scoreValue.textContent=String(run.score).padStart(3,"0"); }
    function updateProtonHUD() {
      const count=clamp(run.protons||0,0,MAX_PROTONS);
      protonHud.dataset.count=String(count);
      protonParticles.forEach((particle,index)=>{
        const active=index<count;
        particle.classList.toggle("is-empty",!active);
      });
      protonHud.setAttribute("aria-label",`Protons: ${count} of ${MAX_PROTONS}`);
    }
    function announce(message) { announcer.textContent=""; setTimeout(()=>announcer.textContent=message,20); }

    function showToast(message) {
      toast.textContent=message;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer=setTimeout(()=>toast.classList.remove("show"),1800);
    }

    function setControlsVisible(visible) {
      hud.classList.toggle("hidden",!visible);
      powerDock.classList.toggle("hidden",!visible);
      if (!visible) tip.classList.add("hidden");
    }

    function startGame(chosenMode="voyage") {
      audio.unlock(); audio.event("press");
      scene="playing";
      resetRun(chosenMode);
      scoreMode.textContent=activeRunName()||"Voyage";
      screen.classList.add("hidden");
      screen.classList.remove("menu-screen");
      setControlsVisible(true);
      audio.setState(AUDIO_STATE.GAMEPLAY,{restartGameplay:chosenMode!=="party"||party.current===0});
      if (!save.tutorialSeen) {
        tip.textContent="Hold anywhere • release to leap";
        tip.classList.remove("hidden");
      }
    }

        </div>

    function showGameOver(reason,isBest=false) {
